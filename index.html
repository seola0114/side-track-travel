<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Side Track — 여행 일정 프로토타입</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF9F5;--ink:#23211E;--muted:#6E6B64;--faint:#A8A49B;--line:#ECE9E1;
    --surface:#FFFFFF;--accent:#C96442;--accent-deep:#A24A2E;--accent-soft:#F6E9E3;--accent-line:#E9D2C6;
    --pin:#B0792E;--pin-soft:#F6EEDD;--warn:#B23B2E;
    --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Pretendard',-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);
    -webkit-font-smoothing:antialiased;line-height:1.5;overflow:hidden}
  ::selection{background:var(--accent);color:#fff}
  .app{display:flex;flex-direction:column;height:100vh;flex:1;min-width:0}

  .bar{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid var(--line);
    background:rgba(244,241,234,.9);backdrop-filter:blur(8px);flex:none;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);align-self:center;box-shadow:0 0 0 3px var(--accent-soft)}
  .brand h1{font-size:15px;font-weight:700;letter-spacing:-.02em}
  .proto-pill{font-family:var(--mono);font-size:9.5px;color:var(--muted);background:var(--surface);border:1px solid var(--line);padding:3px 8px;border-radius:20px}

  .toggle{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;margin-left:4px}
  .toggle button{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--muted);border:none;background:none;padding:5px 12px;border-radius:7px;cursor:pointer;transition:.16s}
  .toggle button.on{background:var(--ink);color:#fff}
  .toggle button.on.linear{background:var(--warn)}

  .hud{display:flex;gap:9px;margin-left:auto;align-items:center}
  .metric{font-family:var(--mono);font-size:10.5px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:5px 10px;display:flex;flex-direction:column;gap:1px;min-width:90px}
  .metric b{font-size:15px;color:var(--ink);font-weight:600;transition:.2s}
  .metric.hot b{color:var(--warn)}
  .metric small{font-size:9px;letter-spacing:.04em;color:var(--faint)}
  .reset{font-family:var(--sans);font-size:12px;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:6px 11px;cursor:pointer;transition:.15s}
  .reset:hover{color:var(--ink)}

  .stage{display:flex;flex:1;min-height:0;position:relative}
  .main-col{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;position:relative}
  .side-col{width:388px;flex:none;border-left:1px solid var(--line);background:linear-gradient(180deg,#fbfaf7,#f1eee6);display:flex;flex-direction:column;min-height:0;overflow:hidden}
  #sideContent{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}
  @media(max-width:860px){.side-col{position:absolute;right:0;top:0;bottom:0;width:88%;max-width:388px;box-shadow:-18px 0 50px rgba(27,25,22,.18);z-index:30;transform:translateX(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1)}.side-col.open{transform:translateX(0)}}

  .col-head{padding:12px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex:none;background:var(--paper)}
  .col-head .tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
  .col-head .title{font-weight:700;font-size:14px}
  .anchor-pill{margin-left:auto;font-family:var(--mono);font-size:9.5px;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-line);padding:2px 8px;border-radius:20px}

  .thread{flex:1;overflow-y:auto;padding:24px 22px 8px;scroll-behavior:smooth;min-height:0}
  .thread::-webkit-scrollbar{width:8px}.thread::-webkit-scrollbar-thumb{background:#d5cfc2;border-radius:9px;border:2px solid var(--paper)}

  .msg{max-width:620px;margin:0 auto 18px;display:flex;flex-direction:column;animation:rise .32s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .msg .who{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
  .bubble{padding:13px 16px;border-radius:14px;font-size:14px;line-height:1.65}
  .msg.user{align-items:flex-end}
  .msg.user .bubble{background:var(--ink);color:#f4f1ea;border-bottom-right-radius:5px;max-width:78%}
  .msg.assistant .bubble{background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:5px}
  .msg.assistant .bubble.selectable{cursor:text}
  .bubble code,.sb code{font-family:var(--mono);font-size:.84em;background:#f0ece3;padding:1px 5px;border-radius:5px}
  .bubble .mdh,.sb .mdh{font-weight:700;color:var(--accent-deep);margin:10px 0 4px;font-size:13px}
  .bubble .mdh:first-child,.sb .mdh:first-child{margin-top:0}
  .bubble .li,.sb .li{padding:1.5px 0 1.5px 2px}

  .pins{max-width:620px;margin:0 auto;padding:0 0 6px}
  .pins-wrap{background:var(--pin-soft);border:1px solid #ecd8bb;border-radius:13px;padding:11px 13px;animation:rise .3s ease both}
  .pins-wrap .ph{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--pin);display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .pin-item{display:flex;gap:9px;align-items:flex-start;font-size:13px;padding:5px 0;border-top:1px solid #efddc2}
  .pin-item:first-of-type{border-top:none}
  .pin-item .pdot{width:7px;height:7px;border-radius:50%;background:var(--pin);margin-top:6px;flex:none}
  .pin-item .ptxt{color:#5e3c14}
  .pin-item .pchk{margin-left:auto;color:#2e7d4f;font-weight:700;font-size:11px;opacity:0;transition:.3s;flex:none}
  .pin-item.done .pchk{opacity:1}

  .composer{flex:none;padding:12px 22px 16px;border-top:1px solid var(--line);background:var(--paper)}
  .suggest{max-width:620px;margin:0 auto 8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .suggest .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-right:2px}
  .schip{font-family:var(--sans);font-size:12.5px;color:var(--accent-deep);background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:20px;padding:5px 12px;cursor:pointer;transition:.15s;font-weight:500}
  .schip:hover{background:#d7e8e4}
  .inrow{max-width:620px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:7px 7px 7px 14px;transition:.15s}
  .inrow:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .inrow textarea{flex:1;border:none;outline:none;resize:none;font-family:var(--sans);font-size:14px;line-height:1.5;background:none;color:var(--ink);max-height:120px;padding:5px 0}
  .send{flex:none;width:36px;height:36px;border-radius:10px;border:none;background:var(--ink);color:#fff;cursor:pointer;font-size:16px;display:grid;place-items:center;transition:.15s}
  .send:hover{background:var(--accent-deep)}.send:disabled{opacity:.35;cursor:default}

  #selmenu{position:fixed;z-index:60;display:none;background:var(--ink);border-radius:11px;padding:5px;gap:3px;box-shadow:0 12px 32px rgba(27,25,22,.3);align-items:center}
  #selmenu.show{display:flex;animation:pop .14s ease both}
  @keyframes pop{from{opacity:0;transform:translateY(5px) scale(.96)}to{opacity:1;transform:none}}
  #selmenu button{font-family:var(--sans);font-size:12.5px;font-weight:600;border:none;border-radius:7px;padding:7px 12px;cursor:pointer;color:#f4f1ea;background:none;white-space:nowrap}
  #selmenu button:hover{background:rgba(255,255,255,.13)}
  #selmenu button.primary{background:var(--accent);color:#fff}
  #selmenu .sep{width:1px;height:18px;background:rgba(255,255,255,.18)}

  .side-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex:none}
  .side-head .tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  .side-head .ttl{font-weight:700;font-size:13px}
  .side-head .x{margin-left:auto;background:none;border:none;font-size:18px;color:var(--faint);cursor:pointer;padding:2px 6px;border-radius:6px}
  .side-head .x:hover{background:#eae6dc;color:var(--ink)}
  .side-body{flex:1;overflow-y:auto;padding:14px 14px 6px;min-height:0}
  .side-body::-webkit-scrollbar{width:7px}.side-body::-webkit-scrollbar-thumb{background:#d5cfc2;border-radius:9px;border:2px solid #f1eee6}
  .side-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;color:var(--faint);gap:11px}
  .side-empty .ic{width:44px;height:44px;border-radius:12px;background:var(--accent-soft);border:1px solid var(--accent-line);display:grid;place-items:center;color:var(--accent);font-size:20px}
  .side-empty p{font-size:13px;line-height:1.6;max-width:230px}
  .side-empty .linear-note{color:var(--warn);font-weight:600}
  .seed{background:var(--accent-soft);border:1px solid var(--accent-line);border-left:3px solid var(--accent);border-radius:9px;padding:8px 11px;font-size:12px;color:var(--accent-deep);margin-bottom:13px}
  .seed small{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:3px}
  .smsg{margin-bottom:12px;animation:rise .3s ease both}
  .smsg .who{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
  .smsg .sb{font-size:13px;line-height:1.6;padding:9px 11px;border-radius:11px}
  .smsg.user .sb{background:var(--ink);color:#f4f1ea;border-bottom-right-radius:4px;margin-left:auto;max-width:88%}
  .smsg.user{display:flex;flex-direction:column;align-items:flex-end}
  .smsg.assistant .sb{background:#fff;border:1px solid var(--line)}
  .side-foot{flex:none;padding:11px 14px 13px;border-top:1px solid var(--line)}
  .bring{width:100%;background:var(--pin);color:#fff;border:none;border-radius:11px;padding:10px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px}
  .bring:hover{background:#9c5a1c}.bring:disabled{opacity:.4;cursor:default;background:var(--faint)}
  .sinrow{display:flex;gap:6px;align-items:flex-end;background:#fff;border:1px solid var(--line);border-radius:12px;padding:5px 5px 5px 11px;margin-top:9px}
  .sinrow:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .sinrow textarea{flex:1;border:none;outline:none;resize:none;font-family:var(--sans);font-size:13px;background:none;max-height:90px;padding:5px 0;line-height:1.5}
  .sinrow .send{width:30px;height:30px;font-size:14px;background:var(--accent)}.sinrow .send:hover{background:var(--accent-deep)}
  .ssuggest{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .folded{padding:6px 14px 10px;border-top:1px solid var(--line);flex:none}
  .folded-toggle{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);cursor:pointer;padding:2px 0}
  .folded-toggle:hover{color:var(--ink)}
  .folded-toggle .ft-ic{font-size:12px}
  .folded-toggle .ft-cnt{font-family:var(--mono);font-size:9.5px;color:var(--pin);background:var(--pin-soft);border:1px solid #ecd8bb;padding:1px 7px;border-radius:10px}
  .folded-chips{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
  .fchip{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:4px 9px;font-size:10.5px;color:var(--muted);cursor:pointer;transition:.14s;max-width:160px}
  .fchip:hover{border-color:var(--accent-line);color:var(--ink);background:var(--accent-soft)}
  .fchip .fdot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex:none}
  .fchip .fdot.note{background:var(--faint);border-radius:1px}
  .fchip .flbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fchip .fbadge{font-family:var(--mono);font-size:8px;color:var(--pin);flex:none}
  /* 히스토리 드로어 — 사이드 패널 왼쪽으로 슬라이드 */
  .history-drawer{position:absolute;right:388px;top:0;bottom:0;width:340px;background:var(--surface);border-left:1px solid var(--line);box-shadow:-10px 0 30px rgba(27,25,22,.1);z-index:20;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.2,.8,.2,1);pointer-events:none;opacity:0}
  .history-drawer.open{transform:translateX(0);pointer-events:auto;opacity:1}
  .hd-head{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line);flex:none}
  .hd-head .hd-ttl{font-weight:700;font-size:13px;flex:1}
  .hd-head .hd-badge{font-family:var(--mono);font-size:9px;color:var(--pin);background:var(--pin-soft);border:1px solid #ecd8bb;padding:2px 7px;border-radius:11px}
  .hd-head .hd-reopen{font-family:var(--sans);font-size:11px;color:var(--accent);background:none;border:1px solid var(--accent-line);border-radius:7px;padding:4px 9px;cursor:pointer}
  .hd-head .hd-reopen:hover{background:var(--accent-soft)}
  .hd-head .x{background:none;border:none;font-size:18px;color:var(--faint);cursor:pointer;padding:2px 6px;border-radius:6px}
  .hd-head .x:hover{background:#eae6dc;color:var(--ink)}
  .hd-body{flex:1;overflow-y:auto;padding:14px;min-height:0}
  .hd-body::-webkit-scrollbar{width:7px}.hd-body::-webkit-scrollbar-thumb{background:#d5cfc2;border-radius:9px;border:2px solid var(--surface)}
  .hd-body .seed{margin-bottom:10px}
  .hd-body .smsg{margin-bottom:10px}
  @media(max-width:860px){.history-drawer{right:0;width:100%;max-width:340px;box-shadow:-12px 0 40px rgba(27,25,22,.18)}}

  .typing{display:inline-flex;gap:4px;padding:4px 2px}
  .typing i{width:6px;height:6px;border-radius:50%;background:var(--faint);animation:tb 1.1s infinite}
  .typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
  @keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

  .guide{position:fixed;left:16px;bottom:16px;z-index:40;width:300px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 16px 44px rgba(27,25,22,.14);overflow:hidden}
  .guide.min{width:auto}
  .guide-h{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid var(--line);cursor:pointer;background:linear-gradient(90deg,var(--accent-soft),#fff)}
  .guide.linear .guide-h{background:linear-gradient(90deg,#f6e4e1,#fff)}
  .guide-h .gi{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--accent);text-transform:uppercase}
  .guide.linear .guide-h .gi{color:var(--warn)}
  .guide-h .gstep{font-family:var(--mono);font-size:11px;color:var(--ink);font-weight:600}
  .guide-h .gmin{margin-left:auto;color:var(--faint);font-size:13px;transition:.2s}.guide.min .gmin{transform:rotate(180deg)}
  .guide-b{padding:12px 13px 14px}.guide.min .guide-b{display:none}
  .guide-b .now{font-size:13px;font-weight:600;line-height:1.5;margin-bottom:4px}
  .guide-b .hint{font-size:11.5px;color:var(--muted);line-height:1.55}
  .guide-b .hint em{color:var(--accent-deep);font-style:normal;font-weight:600}
  .origin{margin-top:9px;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:11px;color:var(--faint);line-height:1.55}
  .origin b{color:var(--muted);font-weight:600}
  .origin .btw{font-family:var(--mono);font-size:10px;color:var(--accent);background:var(--accent-soft);padding:1px 5px;border-radius:4px}
  .dots{display:flex;gap:4px;margin-top:11px}
  .dots i{height:4px;flex:1;border-radius:3px;background:var(--line);transition:.25s}
  .dots i.done{background:var(--accent)}.dots i.cur{background:var(--ink)}
  .guide.linear .dots i.done{background:var(--warn)}
  /* 고도화: 고정 칩 레일 / 재합류 모션 / 복귀 비용 / 선택 힌트 */
  .pinrail{flex:none;display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:9px 22px;border-bottom:1px solid #ecd8bb;background:linear-gradient(90deg,var(--pin-soft),var(--paper))}
  .pinrail .rlbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--pin);white-space:nowrap}
  .pinchip{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid #ecd8bb;border-radius:20px;padding:5px 6px 5px 11px;font-size:12.5px;color:#5e3c14;box-shadow:0 2px 6px rgba(179,106,36,.08)}
  .pinchip .pcd{width:6px;height:6px;border-radius:50%;background:var(--pin);flex:none}
  .pinchip .pcx{border:none;background:none;color:var(--faint);cursor:pointer;font-size:13px;line-height:1;padding:1px 4px;border-radius:6px}
  .pinchip .pcx:hover{background:#f0e3d0;color:var(--warn)}
  .pinchip.landing{animation:land .42s cubic-bezier(.2,1.3,.3,1) both}
  @keyframes land{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
  .flychip{position:fixed;z-index:80;background:var(--pin);color:#fff;border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:700;box-shadow:0 12px 30px rgba(179,106,36,.42);pointer-events:none;white-space:nowrap;transition:transform .62s cubic-bezier(.4,0,.2,1),opacity .62s ease}
  .returnbtn{position:absolute;left:50%;top:54px;transform:translateX(-50%);z-index:25;background:var(--warn);color:#fff;border:none;border-radius:22px;padding:8px 15px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 8px 22px rgba(162,59,46,.3);display:none;align-items:center;gap:6px;animation:rise .3s ease both}
  .returnbtn.show{display:inline-flex}
  .returnbtn:hover{background:#8a3024}
  .anchor-pill.warnpill{color:var(--warn);background:#f6e4e1;border-color:#e6bcb4}
  .seedhint{border-bottom:1.6px dashed var(--accent);cursor:text;transition:background .15s;border-radius:2px}
  .seedhint:hover{background:var(--accent-soft)}
  /* 답글(인용) UI — 클로드 스타일 */
  .quote-card{max-width:620px;margin:0 auto 8px;position:relative;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--muted);border-radius:10px;padding:9px 12px 9px 13px;animation:rise .2s ease both}
  .quote-card .qx{position:absolute;left:-9px;top:-9px;width:22px;height:22px;border-radius:50%;background:var(--surface);border:1px solid var(--line);color:var(--muted);font-size:13px;line-height:1;cursor:pointer;display:grid;place-items:center;box-shadow:0 2px 7px rgba(27,25,22,.13)}
  .quote-card .qx:hover{color:var(--warn);border-color:#e6bcb4}
  .quote-card .qlbl{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
  .quote-card .qtxt{font-size:12.5px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .qbubble{max-width:78%;align-self:flex-end;background:rgba(27,25,22,.05);border-left:3px solid var(--faint);border-radius:8px;padding:6px 10px;font-size:11.5px;color:var(--muted);line-height:1.45;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  /* 사용성: 탭 선택 / 다시 열기 / 지표·버튼 피드백 / 복귀 하이라이트 */
  .seedhint{cursor:pointer}
  .fcard{cursor:pointer;transition:.14s}
  .fcard:hover{border-color:var(--accent-line);background:#fafdfc}

/* ===== SCRIPTED RESPONSES (single scenario: 도쿄 여행) ===== */
const SCRIPT = {
  main1: `11월 도쿄 3박 4일, 둘이서 도는 일정 초안을 짰어요. 11월 도쿄는 단풍이 절정에 드는 시기라 낮 최고기온이 15~18도로 선선하고, 아침저녁은 꽤 쌀쌀해요. 얇은 패딩이나 트렌치코트에 머플러 정도 챙기면 딱 좋습니다. 동선은 "하루에 한두 지역을 깊게" 원칙으로, 무리하지 않게 짰어요.\n\n**Day 1 — 신주쿠 도착 & 적응**\n- 오후: 나리타 공항 도착 → 신주쿠 이동, 호텔 체크인\n- 저녁: 가부키초·오모이데요코초(추억의 골목)에서 꼬치구이에 맥주 한잔\n- 밤: 도쿄도청 전망대(무료)에서 야경 — 줄이 길면 과감히 패스\n- 첫날은 시차·이동 피로 회복용으로 동선을 짧게 잡았어요\n\n**Day 2 — 시부야 · 하라주쿠 · 오모테산도**\n- 오전: 시부야 스크램블 교차로, 시부야 스카이 전망대(사전 예약 권장)\n- 점심: 하라주쿠 다케시타 거리에서 크레페·길거리 음식\n- 오후: 메이지신궁 단풍 산책 → 오모테산도 편집숍·카페 거리\n- 저녁: 시부야 요코초에서 이자카야 분위기\n\n**Day 3 — 아사쿠사 · 우에노 · 야나카**\n- 오전: 센소지·나카미세 거리, 기모노 대여 인증샷\n- 점심: 아사쿠사 텐동 또는 갓 구운 멜론빵\n- 오후: 우에노 공원·국립박물관, 아메요코 시장 군것질\n- 저녁: 옛 정취가 남은 야나카 긴자 골목 산책\n\n**Day 4 — 도요스 · 오다이바 & 출국**\n- 오전: 도요스 시장 오마카세(예약 필수) 또는 회전초밥\n- 오후: 팀랩 플래닛(시간 지정 예약 필수), 오다이바 자유의 여신상·레인보우브리지 뷰\n- 저녁: 돈키호테·드럭스토어에서 기념품 쇼핑 후 공항 이동, 출국\n\n이동이 꽤 많은 일정이라 출발 전에 교통편(예: **JR패스**를 살지 말지)이랑 현지 **eSIM** 통신을 미리 정해두면 동선이 훨씬 매끄러워져요. 예약이 필요한 시부야 스카이·팀랩 플래닛·도요스 오마카세는 날짜가 정해지면 바로 잡는 걸 권합니다. 어느 부분부터 좁혀볼까요?`,
  main6: `사이드에서 정한 교통·통신 결정을 반영해서 일정을 확정했어요. 예약 타이밍과 이동 동선, 결제 수단까지 한 번에 정리했습니다.\n\n**Day 1 — 신주쿠 도착 & 적응**\n- 나리타 → 신주쿠: 스카이라이너 + 야마노테선, 스이카 한 번 태그로 환승까지 해결\n- 저녁: 오모이데요코초 꼬치구이 → 도쿄도청 전망대 야경\n- 비행기에서 내리자마자 eSIM이 자동 연결돼 바로 구글맵으로 호텔 찾아가기\n\n**Day 2 — 시부야 · 하라주쿠 · 오모테산도**\n- 시부야 스카이(오전 예약) → 다케시타 거리 → 메이지신궁 단풍 → 오모테산도\n- 저녁: 시부야 요코초 이자카야\n- 모든 이동은 스이카 태그, 둘이 각자 eSIM이라 잠깐 떨어져도 길 안 잃음\n\n**Day 3 — 아사쿠사 · 우에노 · 야나카**\n- 센소지·나카미세 → 우에노 공원·국립박물관 → 아메요코 → 야나카 긴자\n- 도보 구간이 길어 편한 신발 필수, 중간에 카페 한 번 쉬어가기\n\n**Day 4 — 도요스 · 오다이바 & 출국**\n- 도요스 시장 오마카세(예약) → 팀랩 플래닛(시간 지정) → 오다이바 레인보우브리지 뷰\n- 오다이바행 유리카모메 노선도 스이카로 그대로 탑승 가능\n- 마지막: 신주쿠 돈키호테·드럭스토어 쇼핑 → 스카이라이너로 나리타\n\n**📌 교통** — JR패스 ✕ (시내 위주라 본전 안 나옴). 도착하면 바로 **스이카** 발급·충전해서 지하철·버스·유리카모메까지 전부 태그. 둘이 각자 한 장씩.\n**📌 통신** — 출발 전 **eSIM** 각자 구매. 공항 내리면 켜자마자 데이터 연결, 포켓와이파이 공유는 안 함.\n\n여기서 핵심은 — 위 두 결정(스이카·eSIM)을 제가 다시 묻지 않았다는 거예요. 사이드 트랙에서 정리한 한 줄 결론이 그대로 최종 일정에 합류했고, 한참 위로 올라간 Day별 일정표도 그대로 살아있죠. 옆으로 새는 질문들이 이 일정표를 밀어내지 않았습니다.`,

  note1:`11월 도쿄 3박 4일 초안을 위 **일정표 패널**에 정리해 뒀어요. "하루에 한두 지역을 깊게" 원칙으로, 첫날은 시차·이동 피로 회복용으로 짧게 잡았습니다. 대화가 길어져도 저 일정표는 위에 그대로 고정돼 있어요.\n\n이동이 꽤 많은 일정이라, 출발 전에 교통편(예: **JR패스**를 살지 말지)이랑 현지 **eSIM** 통신을 미리 정해두면 동선이 훨씬 매끄러워져요. 어느 부분부터 좁혀볼까요?`,
  artifact6:`**11월 도쿄 · 3박 4일 · 2인 · 확정본**\n\n**Day 1 — 신주쿠 도착 & 적응**\n- 나리타 → 신주쿠: 스카이라이너 + 야마노테선, 스이카 태그\n- 저녁: 오모이데요코초 → 도쿄도청 야경\n- 도착 즉시 eSIM 자동 연결 → 바로 구글맵\n\n**Day 2 — 시부야 · 하라주쿠 · 오모테산도**\n- 시부야 스카이(오전 예약) → 다케시타 → 메이지신궁 → 오모테산도\n- 저녁: 시부야 요코초 이자카야\n- 이동은 스이카, 각자 eSIM이라 떨어져도 길 안 잃음\n\n**Day 3 — 아사쿠사 · 우에노 · 야나카**\n- 센소지·나카미세 → 우에노 공원·박물관 → 아메요코 → 야나카 긴자\n- 도보 구간 길어 편한 신발, 중간 카페 휴식\n\n**Day 4 — 도요스 · 오다이바 & 출국**\n- 도요스 오마카세(예약) → 팀랩 플래닛(시간지정) → 오다이바\n- 유리카모메도 스이카로 탑승 → 신주쿠 쇼핑 → 스카이라이너로 나리타\n\n**📌 확정 결정**\n- 교통: JR패스 ✕, 스이카 ○ (시내 위주, 각자 1장)\n- 통신: 각자 eSIM (포켓와이파이 공유 ✕)`,
  note6:`사이드에서 정한 **교통·통신 결정을 위 일정표에 반영**해 확정했어요. 핵심은 — 그 두 결정을 제가 다시 묻지 않았고, 사이드에서 정리한 한 줄 결론이 그대로 일정표에 합류했다는 거예요. 옆으로 새는 질문이 몇 개가 오가도, 이 일정표는 위에 고정된 채 점점 정확해졌습니다.`,
  // 선택한 텍스트(seed)에 아래 키가 포함되면 해당 토픽 답변을 사용. 각 토픽은 [정의, 우리 일정 적용] 2턴.
  side: {
    'JR패스':[
      `**JR패스 = JR(일본 철도) 노선을 일정 기간 무제한으로 타는 외국인 전용 패스**예요.\n\n7일권이 약 5만 엔. "본전 뽑으려면" 도쿄–오사카–교토처럼 도시 사이를 신칸센으로 여러 번 오가야 해요.\n\n그런데 지금 일정은 **도쿄 시내에만** 머물러요. 시내 이동은 대부분 도쿄메트로·지하철이라 JR패스로 커버가 잘 안 되고, 본전도 못 뽑습니다.`,
      `우리 일정 기준으로는 **JR패스 사지 말고 스이카(Suica)로 확정**하는 게 답이에요.\n\n- 4일 내내 신주쿠·시부야·아사쿠사·우에노·오다이바 등 **시내만** 돌아요 → 도시 간 신칸센 탈 일이 없음\n- 공항 도착 후 자판기에서 발급(모바일 스이카면 폰에 바로 추가) → 2,000~3,000엔 충전\n- 둘이니까 각자 한 장씩, 지하철·버스·편의점까지 태그\n- 남은 잔액은 마지막 날 편의점에서 소진\n\n실제 교통비는 1인당 1만 엔 안팎이라, 5만 엔짜리 JR패스는 오히려 3~4배 손해예요.`,

    'eSIM':[
      `**eSIM = 유심칩 없이 QR코드로 바로 까는 데이터 요금제**예요.\n\n공항 로밍·포켓와이파이랑 비교하면:\n- 로밍: 편하지만 비쌈 (하루 1만 원대)\n- 포켓와이파이: 기기 수령·반납 번거롭고 충전도 챙겨야 함\n- eSIM: 한국에서 미리 구매 → 도착하면 자동 연결, 4일에 1만 원 안팎\n\n아이폰·갤럭시 최근 기종은 다 지원해요. 출발 전에 사두면 공항에서 줄 설 필요 없이 켜자마자 인터넷이 돼요.`,
      `둘이 가니까 **각자 eSIM 하나씩**이 제일 깔끔해요.\n\n- 4일짜리 데이터 eSIM을 출발 전에 각자 구매 (1인 8,000~12,000원 선)\n- 포켓와이파이처럼 한 대를 공유하면, 둘이 떨어졌을 때 한 명은 인터넷이 끊겨요 (지도 보다 길 잃기 딱 좋음)\n- eSIM이면 각자 구글맵·번역 자유롭게 쓰고, 기기 반납도 신경 안 써도 됨\n\n→ 결론: **포켓와이파이 공유 ✕, 각자 eSIM ○.**`,

    '오모이데요코초':[
      `**오모이데요코초(思い出横丁)**는 신주쿠역 서쪽의 좁은 골목 먹자거리예요. "추억의 골목"이라는 뜻으로, 전후 분위기가 그대로 남은 작은 야키토리(꼬치구이)·라멘 가게가 다닥다닥 붙어 있어요.\n\n연기 자욱한 좁은 골목에 빨간 등이 걸려 있어서 사진 찍기 좋고, "도쿄 옛 정취"를 제대로 느낄 수 있는 곳입니다.`,
      `**Day 1 저녁 코스로 딱**이에요 — 신주쿠 호텔에서 걸어갈 수 있거든요.\n\n- 야키토리 몇 꼬치 + 생맥주로 첫날 가볍게 마무리\n- 가게가 워낙 작아서(4~6석) 둘이면 오히려 들어가기 쉬움\n- 현금만 받는 집이 많으니 엔화 잔돈 챙기기\n- 18~20시가 가장 붐비니 자리 원하면 조금 이르게\n\n→ 결론: Day 1 저녁에 가볍게 한두 집만.`,

    '다케시타':[
      `**다케시타 거리(竹下通り)**는 하라주쿠역 바로 앞의 좁고 긴 보행자 거리예요. 일본 10~20대 패션·서브컬처의 중심지로, 알록달록한 옷가게·액세서리숍·크레페 노점이 빽빽하게 늘어서 있어요.\n\n무지개 솜사탕, 거대 크레페 같은 "인스타 감성" 길거리 음식으로도 유명합니다.`,
      `Day 2 하라주쿠 일정에 자연스럽게 들어가요.\n\n- 주말·오후엔 인파가 정말 많아요 → 오전이나 평일이 쾌적\n- 크레페 하나는 둘이 나눠 먹어도 충분할 만큼 큼\n- 거리 자체는 짧아 30~40분이면 훑어요\n- 끝까지 걸으면 메이지신궁·오모테산도로 이어져 동선이 깔끔\n\n→ 결론: Day 2 오전~점심에 다케시타 → 메이지신궁 → 오모테산도 순서로.`,

// 토픽 인식 키워드 — 더블클릭/부분 선택/조사 포함 대응
const SIDE_ALIASES={
  'JR패스':['jr패스','jr','패스'],
  'eSIM':['esim','e심','이심'],
  '오모이데요코초':['오모이데요코초','오모이데','요코초'],
  '다케시타':['다케시타'],
  '아메요코':['아메요코'],
  '야나카':['야나카'],
};
const SIDE_PINS={'JR패스':'교통: 스이카로 확정','eSIM':'통신: 각자 eSIM'};
function sideTopicKey(seed){
  let s=(seed||'').toLowerCase().replace(/\s+/g,'');
  // 끝에 붙은 한국어 조사 떼기 (패스를 → 패스, 아메요코에서 → 아메요코)
  s=s.replace(/(을|를|은|는|이|가|에서|에게|에|도|의|와|과|랑|이랑)$/,'');
  if(s.length<2)return null;
  for(const topic of Object.keys(SCRIPT.side)){
    const keys=(SIDE_ALIASES[topic]||[topic]).map(k=>k.toLowerCase().replace(/\s+/g,''));
    if(keys.some(k=>s.includes(k)||k.includes(s)))return topic;
  }
  return null;
}
function getSideReplyFor(sd){
  const topic=sd.topicKey?SCRIPT.side[sd.topicKey]:null;
  const turn=sd.msgs.filter(m=>m.role==='assistant').length;
  if(topic)return turn<topic.length?topic[turn]:SCRIPT.sideFollow;
  if(turn===0)return `"${sd.seed}" 부분이군요. 이건 정해진 답이 있는 결정형 질문이 아니라 탐색형에 가까워요. 데모라 상세 답변이 준비된 결정 항목은 JR패스·eSIM 정도이고요.\n\n그래도 사이드 트랙의 쓰임은 같아요 — 메인 일정을 건드리지 않고 여기서 자유롭게 더 살펴본 뒤, 핀할 결론이 없으면 메모로 남겨둘 수 있습니다.`;
  return SCRIPT.sideFollow;
}
function summarizeForPin(seed,text){
  // 토픽이 잡히면 1Pager가 약속한 깔끔한 결론 한 줄로 고정 (부분 선택도 동일)
  const tk=sideTopicKey(seed);
  if(tk&&SIDE_PINS[tk])return SIDE_PINS[tk];
  let t=(text||'').replace(/[`*#>]/g,'');
  const lines=t.split('\n').map(s=>s.trim()).filter(Boolean);
  // 결론/추천 한 줄 우선 — '→' 또는 '결론'이 든 줄, 없으면 첫 문장
  let pick=lines.find(l=>l.startsWith('→')||l.includes('결론'))||lines[0]||'';
  pick=pick.replace(/^→\s*/,'').replace(/^결론[:：]\s*/,'').trim();
  if(pick.length>78)pick=pick.slice(0,76)+'…';
  const head=seed.length>18?seed.slice(0,17)+'…':seed;
  return pick.startsWith(head)?pick:`${head}: ${pick}`;
}

/* ===== RENDER ===== */
function mdfmt(t){
  let h=escapeHtml(t);
  h=h.replace(/^#{1,6}\s*(.+)$/gm,'<div class="mdh">$1</div>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/^\s*[-*]\s+(.+)$/gm,'<div class="li">• $1</div>');
  h=h.replace(/^\s*(\d+)\.\s+(.+)$/gm,'<div class="li">$1. $2</div>');
  h=h.replace(/\n/g,'<br>');
  h=h.replace(/<br>(<div class="(li|mdh)">)/g,'$1').replace(/(<\/div>)<br>/g,'$1');
  return h;
}

    html+=`</div><div class="side-foot">`;
    if(!sd.busy){
      html+=`<div class="ssuggest">`+sd.suggests.map(x=>`<button class="schip" onclick="sideSuggest(\`${x}\`)">${x}</button>`).join('')+`</div>`;
      html+=`<div class="sinrow"><textarea id="sideIn" rows="1" placeholder="${open?'여기서 자유롭게 더 묻기…':'이 질문에만 묻기…'}"></textarea><button class="send" onclick="onSideSend()">↑</button></div>`;
    }
    if(sd.msgs.some(m=>m.role==='assistant')){
      if(open) html+=`<div class="open-note">탐색형 질문이라 일정에 핀할 <b>결론이 없어요</b>. 사이드 트랙은 결정형 곁가지용 — 이건 메모로 남겨둘 수 있어요.</div><button class="bring note${sd.busy?'':' ready'}" ${sd.busy?'disabled':''} onclick="saveAsNote()">🔖 ${isReview?'메모 갱신':'메모로 보관'}</button>`;
      else html+=`<button class="bring${sd.busy?'':' ready'}" ${sd.busy?'disabled':''} onclick="bringToMain()">📌 ${isReview?'결론 다시 반영':'메인으로 가져오기'}</button>`;
    }
    html+=`</div>`;
  }else{
    html+=`<div class="side-head"><span class="tag">Side track</span><span class="ttl">독립 작업 공간</span></div>`;
    if(!S.artifact&&!S.folded.length) html+=`<div class="side-empty"><div class="ic">↳</div><p>일정표나 답변에서 궁금한 한 부분을 <b>드래그·탭</b>해 <b>사이드로 묻기</b>를 누르면, 일정표를 건드리지 않고 여기서 처리합니다. 여러 개를 동시에 띄워둘 수도 있어요.</p></div>`;
  }
  if(S.folded.length){
    html+=`<div class="folded"><div class="folded-toggle" onclick="this.parentElement.querySelector('.folded-chips').classList.toggle('show')"><span class="ft-ic">📋</span> 히스토리 <span class="ft-cnt">${S.folded.length}</span></div>`;
    html+=`<div class="folded-chips">`+S.folded.map(f=>`<div class="fchip" onclick="openHistory(${f.id})"><span class="fdot ${f.kind}"></span><span class="flbl">${escapeHtml(f.title)}</span></div>`).join('')+`</div></div>`;
  }
  c.innerHTML=html;const sb=document.getElementById('sideBody');if(sb)sb.scrollTop=sb.scrollHeight;
}
const _lastM={};
function bumpMetric(el,val,key){
  if(_lastM[key]!==undefined&&_lastM[key]!==val){el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');setTimeout(()=>el.classList.remove('bump'),440);}
  _lastM[key]=val;
}
function renderHud(){
  const ctx=document.getElementById('mtCtx'),sd=document.getElementById('mtSide'),rt=document.getElementById('mtReturn');
  ctx.querySelector('b').textContent=S.apiLen;
  sd.querySelector('b').textContent=S.sideCount;
  rt.querySelector('b').textContent=S.returnCost;
  bumpMetric(ctx,S.apiLen,'ctx');bumpMetric(sd,S.sideCount,'sd');bumpMetric(rt,S.returnCost,'rt');
  ctx.classList.toggle('hot',S.mode==='linear'&&S.apiLen>=5);
  rt.classList.toggle('hot',S.returnCost>0);
  const pill=document.querySelector('.anchor-pill');
  if(pill){
    pill.classList.toggle('warnpill',S.mode==='linear');
    if(S.mode==='linear')pill.textContent='대조군 · 일정표가 스크롤 위로 밀림';
    else if(S.artifact)pill.textContent='일정표 = 사이드 고정 · 대화와 분리';
    else pill.textContent='메인 일정은 깨끗하게 유지';
  }
}
function renderGuide(){
  const g=document.getElementById('guide');
  g.classList.toggle('linear',S.mode==='linear');
  const idx=Math.min(S.step,6)-1;
  const steps=S.mode==='linear'?SCENARIO.linearSteps:SCENARIO.steps;
  document.getElementById('gStep').textContent=Math.min(S.step,6)+' / 6';
  document.getElementById('gNow').innerHTML=steps[idx].now;
  document.getElementById('gHint').innerHTML=steps[idx].hint;
  document.getElementById('gOrigin').innerHTML=SCENARIO.origin;
  let d='';for(let i=0;i<6;i++)d+=`<i class="${i<S.step-1?'done':(i===S.step-1?'cur':'')}"></i>`;
  document.getElementById('gDots').innerHTML=d;
}
function renderSuggest(){
  const w=document.getElementById('suggest');
  if(S._chipUsed){w.innerHTML='';return;}
  const map=S.mode==='side'?SCENARIO.chips.side:SCENARIO.chips.linear;
  const key=Object.keys(map).map(Number).filter(k=>k<=S.step).sort((a,b)=>b-a)[0];
  const chips=map[key]||[];
  w.innerHTML=chips.length?`<span class="lbl">제안</span>`+chips.map(c=>`<button class="schip" onclick="sendSuggest(\`${c}\`)">${c}</button>`).join(''):'';
}
function renderPinRail(){
  const r=document.getElementById('pinrail');
  if(S.mode!=='side'||!S.pins.length){r.style.display='none';r.innerHTML='';return;}
  r.style.display='flex';
  r.innerHTML=`<span class="rlbl">📌 확정한 결정 · 고정</span>`+
    S.pins.map(p=>`<span class="pinchip${p.landing?' landing':''}"><span class="pcd"></span>${escapeHtml(p.txt)}<button class="pcx" title="제거" onclick="removePin(${p.id})">×</button></span>`).join('');
  S.pins.forEach(p=>{if(p.landing)setTimeout(()=>{p.landing=false;},460);});
}
function renderReturnBtn(){
  document.getElementById('returnBtn').classList.toggle('show',S.mode==='linear'&&S.apiLen>=6);
}
function hintSeeds(html){
  if(S.mode!=='side'||S.step>=6)return html;
  return html.replace(/<b>(JR패스|eSIM)<\/b>/g,'<b class="seedhint" title="탭 또는 드래그 → 답글/사이드로 묻기">$1</b>');
}
function removePin(id){
  S.pins=S.pins.filter(p=>p.id!==id);
  S.folded=S.folded.filter(f=>!(f.kind==='pin'&&f.pinId===id));
  if(S.sideCount>0)S.sideCount--;
  renderAll();
}
function returnToItinerary(){
  const el=document.getElementById('itinMsg'),t=document.getElementById('thread');
  if(el){el.scrollIntoView({behavior:'smooth',block:'start'});el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}
  else if(t)t.scrollTo({top:0,behavior:'smooth'});
  S.returnCost++;renderHud();renderReturnBtn();
}
function flyToRail(start,line){
  if(!start)return;
  const rail=document.getElementById('pinrail');
  if(!rail||rail.style.display==='none')return;
  const end=rail.getBoundingClientRect();
  const fly=document.createElement('div');
  fly.className='flychip';fly.textContent='📌 '+line;
  fly.style.left=start.left+'px';fly.style.top=start.top+'px';
  document.body.appendChild(fly);
  requestAnimationFrame(()=>{
    fly.style.transform=`translate(${(end.left+70)-start.left}px,${(end.top+12)-start.top}px) scale(.85)`;
    fly.style.opacity='0.1';
  });
  setTimeout(()=>fly.remove(),680);
}
function renderQuote(){
  const w=document.getElementById('quoteWrap');if(!w)return;
  const i=document.getElementById('mainIn');
  if(!S.quote){w.innerHTML='';if(i)i.placeholder='메시지를 입력하세요…';return;}
  w.innerHTML=`<div class="quote-card"><button class="qx" title="답글 취소" onclick="clearQuote()">×</button><div class="qlbl">↰ 답글</div><div class="qtxt">${escapeHtml(S.quote)}</div></div>`;
}
function clearQuote(){S.quote=null;renderQuote();}
function toggleArtifact(){S.artifactMin=!S.artifactMin;renderSide();}
function renderAll(){renderMain();renderPinRail();renderReturnBtn();renderSide();renderHud();renderGuide();renderSuggest();renderQuote();}

/* ===== MAIN COMPOSER ===== */
function fillMain(t){const i=document.getElementById('mainIn');i.value=t;i.focus();autoGrow(i);}
function sendSuggest(t){if(S.busy)return;S._chipUsed=true;document.getElementById('suggest').innerHTML='';const i=document.getElementById('mainIn');i.value=t;onMainSend();}
function syncBusy(){document.getElementById('mainSend').disabled=!!S.busy;}
function setBusy(b){S.busy=b;syncBusy();}
function baseMainSend(){
  if(S.busy)return;
  const i=document.getElementById('mainIn');const text=i.value.trim();if(!text)return;
  i.value='';autoGrow(i);
  const st=S;
  const q=st.quote||null;st.quote=null;
  st.display.push({role:'user',text,quote:q});
  st.apiLen++;
  st.display.push({role:'typing'});setBusy(true);renderAll();
  setTimeout(()=>{
    st.apiLen++;st.display.pop();
    if(st.step===1){
      if(st.mode==='side'){st.artifact={ver:'v1',title:'도쿄 3박 4일 일정 · 초안',body:SCRIPT.artifact1};st.display.push({role:'assistant',text:SCRIPT.note1});}
      else st.display.push({role:'assistant',text:SCRIPT.main1});
    }else if(st.step>=6){
      if(st.mode==='side'){st.artifact={ver:'v2',title:'도쿄 3박 4일 일정 · 확정',body:SCRIPT.artifact6};st.artifactMin=false;st.display.push({role:'assistant',text:SCRIPT.note6});}
      else st.display.push({role:'assistant',text:SCRIPT.main6});
    }else st.display.push({role:'assistant',text:'(제안 칩을 눌러 시나리오를 이어가 주세요)'});
    if(st.pendingPins.length){st.pendingPins=[];}
    if(st.step===1)st.step=2;
    if(st.pins.length&&st.step>=6)st.pins.forEach(p=>p.done=true);
    if(st.artifact)document.getElementById('sideCol').classList.add('open');
    st._chipUsed=false;
    st.busy=false;if(st===S){syncBusy();renderAll();}
  },replyDelay());
}

/* ===== SELECTION MENU ===== */
const selmenu=document.getElementById('selmenu');let lastSel='';
document.addEventListener('mouseup',e=>{if(e.target.closest('#selmenu')||e.target.closest('.seedhint'))return;setTimeout(checkSel,0);});
document.addEventListener('click',e=>{const h=e.target.closest('.seedhint');if(!h||S.mode!=='side')return;lastSel=h.textContent.trim();showSelMenu(h.getBoundingClientRect());});
function checkSel(){
  const sel=window.getSelection();
  if(S.mode!=='side'||!sel||sel.isCollapsed||!sel.toString().trim()){hideSel();return;}
  const a=sel.anchorNode&&sel.anchorNode.parentElement;
  if(!a||!a.closest('.selectable')){hideSel();return;}
  lastSel=sel.toString().trim();
  showSelMenu(sel.getRangeAt(0).getBoundingClientRect());
}
function showSelMenu(r){
  selmenu.classList.add('show');
  let top=r.top-selmenu.offsetHeight-9;if(top<8)top=r.bottom+9;
  let left=r.left+r.width/2-selmenu.offsetWidth/2;
  left=Math.max(10,Math.min(left,window.innerWidth-selmenu.offsetWidth-10));
  selmenu.style.top=top+'px';selmenu.style.left=left+'px';
}
function hideSel(){selmenu.classList.remove('show');}
function selChoose(where){
  const text=lastSel;window.getSelection().removeAllRanges();hideSel();
  if(where==='main'){S.quote=text;renderQuote();const i=document.getElementById('mainIn');i.placeholder='답글 입력…';i.focus();return;}
  openSide(text);
}

/* ===== SIDE TRACK (여러 개 동시) ===== */
function activeSideObj(){return S.sides.find(x=>x.id===S.activeSide)||null;}
function trayLabel(x){const t=x.seed||'질문';return t.length>9?t.slice(0,8)+'…':t;}
function foldTitle(seed){return seed.length>20?seed.slice(0,19)+'…':seed;}
function openSide(seed){
  const id=++S.seq;const tk=sideTopicKey(seed);
  S.sides.push({id,seed,topicKey:tk,kind:tk?'decision':'open',msgs:[],busy:false,suggests:SCENARIO.sideSuggests()});
  S.activeSide=id;
  if(S.step===2)S.step=3;
  document.getElementById('sideCol').classList.add('open');renderAll();
}
function switchSide(id){S.activeSide=id;renderAll();}
function finishSide(id){
  S.sides=S.sides.filter(x=>x.id!==id);
  if(S.activeSide===id)S.activeSide=S.sides.length?S.sides[S.sides.length-1].id:null;
  if(!S.sides.length&&!S.artifact)document.getElementById('sideCol').classList.remove('open');
}
function closeSideById(ev,id){if(ev&&ev.stopPropagation)ev.stopPropagation();finishSide(id);renderAll();}
function closeSide(){const a=activeSideObj();if(a)finishSide(a.id);renderAll();}
function sideSuggest(t){const sd=activeSideObj();if(!sd||sd.busy)return;const i=document.getElementById('sideIn');if(i){i.value=t;onSideSend();}}
function onSideSend(){
  const sd=activeSideObj();if(!sd||sd.busy)return;
  const i=document.getElementById('sideIn');const text=i.value.trim();if(!text)return;
  i.value='';sd.msgs.push({role:'user',text});sd.msgs.push({role:'typing'});sd.busy=true;renderSide();
  const out=getSideReplyFor(sd);
  setTimeout(()=>{sd.msgs.pop();sd.msgs.push({role:'assistant',text:out});sd.busy=false;renderSide();},replyDelay());
}
function bringToMain(){
  const sd=activeSideObj();if(!sd||sd.busy||sd.kind!=='decision')return;
  if(!sd.msgs.some(m=>m.role==='assistant'))return;
  const lastA=[...sd.msgs].reverse().find(m=>m.role==='assistant');
  const line=summarizeForPin(sd.seed,lastA&&lastA.text);
  if(sd.reviewFoldedId!=null){
    const f=S.folded.find(x=>x.id===sd.reviewFoldedId);
    if(f){f.msgs=sd.msgs.map(m=>({...m}));const pin=S.pins.find(pp=>pp.id===f.pinId);if(pin)pin.txt=line;}
    finishSide(sd.id);renderAll();return;
  }
  const btn=document.querySelector('.bring');const start=btn?btn.getBoundingClientRect():null;
  const pid=++S.seq;
  S.pins.push({id:pid,txt:line,done:false,landing:true});
  S.pendingPins.push(line);
  S.folded.push({id:++S.seq,kind:'pin',pinId:pid,title:foldTitle(sd.seed)+' · 결론',seed:sd.seed,topicKey:sd.topicKey,msgs:sd.msgs.map(m=>({...m}))});
  S.sideCount++;
  finishSide(sd.id);
  if(S.step===3)S.step=5;else if(S.step>=5)S.step=6;
  renderAll();flyToRail(start,line);
}
function saveAsNote(){
  const sd=activeSideObj();if(!sd||sd.busy)return;
  if(!sd.msgs.some(m=>m.role==='assistant'))return;
  if(sd.reviewFoldedId!=null){const f=S.folded.find(x=>x.id===sd.reviewFoldedId);if(f)f.msgs=sd.msgs.map(m=>({...m}));finishSide(sd.id);renderAll();return;}
  S.folded.push({id:++S.seq,kind:'note',title:foldTitle(sd.seed)+' · 메모',seed:sd.seed,topicKey:sd.topicKey,msgs:sd.msgs.map(m=>({...m}))});
  finishSide(sd.id);renderAll();
}
function reopenFolded(id){
  const f=S.folded.find(x=>x.id===id);if(!f||!f.msgs)return;
  const sid=++S.seq;
  S.sides.push({id:sid,seed:f.seed||'',topicKey:f.topicKey||null,kind:f.kind==='pin'?'decision':'open',msgs:f.msgs.map(m=>({...m})),busy:false,suggests:SCENARIO.sideSuggests(),reviewFoldedId:f.id});
  S.activeSide=sid;
  document.getElementById('sideCol').classList.add('open');renderAll();
}
/* ===== HISTORY DRAWER ===== */
function openHistory(id){
  const f=S.folded.find(x=>x.id===id);if(!f||!f.msgs)return;
  const d=document.getElementById('historyDrawer');
  let html=`<div class="hd-head"><span class="hd-ttl">${escapeHtml(f.title)}</span><span class="hd-badge">${f.kind==='note'?'메모':'핀 완료'}</span><button class="hd-reopen" onclick="closeHistory();reopenFolded(${f.id})">↩ 다시 열기</button><button class="x" onclick="closeHistory()">×</button></div>`;
  html+=`<div class="hd-body"><div class="seed"><small>선택한 부분</small>"${escapeHtml(f.seed||'')}"</div>`;
  f.msgs.forEach(m=>{
    if(m.role==='user') html+=`<div class="smsg user"><div class="sb">${escapeHtml(m.text)}</div></div>`;
    else if(m.role==='assistant') html+=`<div class="smsg assistant"><div class="sb">${mdfmt(m.text)}</div></div>`;
  });
  html+=`</div>`;
  d.innerHTML=html;d.classList.add('open');
}
function closeHistory(){document.getElementById('historyDrawer').classList.remove('open');}

/* ===== MAIN SEND (side + linear branch) ===== */
function onMainSend(){
  if(S.mode==='linear'&&S.step>=2&&S.step<=6){
    if(S.busy)return;
    const i=document.getElementById('mainIn');const text=i.value.trim();if(!text)return;
    i.value='';autoGrow(i);
    const st=S;
    st.display.push({role:'user',text});st.apiLen++;
    st.display.push({role:'typing'});setBusy(true);renderAll();
    const step=st.step;
    setTimeout(()=>{
      const rep=LINEAR_REPLIES[step]||'계속 진행해 주세요.';
      st.apiLen++;st.display.pop();st.display.push({role:'assistant',text:rep});
      if(step<6)st.step++;else st.step=7;
      st._chipUsed=false;
      st.busy=false;if(st===S){syncBusy();renderAll();}
    },450);
  }else{baseMainSend();}
}
document.getElementById('mainSend').onclick=onMainSend;
document.getElementById('mainIn').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();onMainSend();}});

/* ===== MODE + RESET ===== */
/* 모드별 상태를 따로 보관해, 전환해도 각자의 진행 상태가 유지됨 */
let STATES={side:null,linear:null};
function newModeState(m){S=freshState();S.mode=m;greet();}
function applyModeUI(m){
  document.getElementById('mSide').classList.toggle('on',m==='side');
  const lin=document.getElementById('mLinear');lin.classList.toggle('on',m==='linear');lin.classList.toggle('linear',m==='linear');
  const col=document.getElementById('sideCol');
  if(m==='side'&&(S.sides.length||S.artifact))col.classList.add('open');else col.classList.remove('open');
  syncBusy();
}
function setMode(m){
  if(m===S.mode)return;
  STATES[S.mode]=S;                 // 현재 모드 상태 저장
  if(STATES[m])S=STATES[m];         // 이전에 하던 게 있으면 복원
  else newModeState(m);             // 없으면 새로 시작
  applyModeUI(m);renderAll();
}
function resetAll(){
  const m=S.mode;
  STATES={side:null,linear:null};   // 양쪽 모두 초기화
  newModeState(m);applyModeUI(m);renderAll();
}
let VIEW='guide';
function setView(v){
  VIEW=v;
  document.getElementById('vGuide').classList.toggle('on',v==='guide');
  document.getElementById('vProduct').classList.toggle('on',v==='product');
  document.body.classList.toggle('product',v==='product');
  const mL=document.getElementById('mLinear'),rb=document.getElementById('returnBtn');
  if(mL)mL.textContent=(v==='product')?'기본 채팅':'일반 채팅 (대조)';
  if(rb)rb.textContent=(v==='product')?'📍 일정표 다시 보기':'📍 일정표 다시 보기 — 한참 위로 스크롤';
  renderSide();
}
function greet(){S.display.push({role:'assistant',text:SCENARIO.greeting});}

/* ===== UTILS ===== */
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
document.getElementById('mainIn').addEventListener('input',e=>autoGrow(e.target));
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&document.activeElement&&document.activeElement.id==='sideIn'){e.preventDefault();onSideSend();}});

/* ===== INIT ===== */
function toggleSidebar(){document.body.classList.toggle('sbhide');}
S=freshState();greet();renderAll();setView('product');
</script>
