<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>Side Track — 일정 변경 대응</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --charcoal:#23212c;
  --paper:#f7f0e1;
  --snow:#ffffff;
  --pine:#006434;
  --marigold:#fcbd1c;
  --ember:#dd5000;

  --sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --dur:180ms;
}
*{box-sizing:border-box;margin:0;padding:0}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
html,body{height:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--charcoal);font-size:16px;line-height:1.29;letter-spacing:-.08px;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100dvh;overflow:hidden;max-width:430px;margin:0 auto}

/* ---- topbar ---- */
.topbar{display:flex;align-items:center;gap:16px;padding:16px 20px;background:var(--paper);flex:none}
.back-btn{background:none;color:var(--pine);border:none;font-family:var(--sans);font-size:14px;font-weight:400;letter-spacing:-.07px;padding:0;cursor:pointer;flex:none}
.back-btn:active{opacity:.5}
.topbar-title{font-size:22px;font-weight:300;letter-spacing:-.33px;line-height:1.15}

/* ---- scroll area ---- */
.scroll{flex:1;overflow-y:auto;padding:20px 20px 40px;display:flex;flex-direction:column;gap:20px}
.scroll::-webkit-scrollbar{width:0;display:none}

/* user bubble */
.bubble{align-self:flex-end;max-width:75%;padding:14px 20px;font-size:16px;line-height:1.29;letter-spacing:-.08px;font-weight:400;background:var(--snow);color:var(--charcoal);border-radius:20px;word-break:keep-all}

/* ---- main card ---- */
.card{background:var(--snow);border-radius:24px;padding:24px 20px;display:flex;flex-direction:column;gap:0}
.card-context{font-size:14px;font-weight:400;color:var(--charcoal);opacity:.5;letter-spacing:-.07px;line-height:1.33;margin-bottom:8px}
.card-title{font-size:28px;font-weight:300;letter-spacing:-.42px;line-height:1.07;margin-bottom:24px}

/* affected / keep sections */
.section{padding:16px 0;border-top:1px solid rgba(35,33,44,.08)}
.section-label{font-size:12px;font-weight:400;text-transform:uppercase;letter-spacing:.5px;line-height:1.18;margin-bottom:8px;opacity:.4}
.section-item{font-size:16px;font-weight:300;letter-spacing:-.08px;line-height:1.5;display:flex;align-items:center;gap:8px}
.section-item .dot{width:6px;height:6px;border-radius:50%;flex:none}
.dot-affected{background:var(--marigold)}
.dot-keep{background:rgba(35,33,44,.15)}

/* ---- A/B plan comparison ---- */
.plans{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.plan{background:var(--paper);border-radius:20px;padding:20px 16px;cursor:pointer;border:2px solid transparent;transition:border-color var(--dur) var(--ease),background var(--dur) var(--ease);display:flex;flex-direction:column;gap:10px;-webkit-tap-highlight-color:transparent}
.plan:active{transform:scale(.97)}
.plan.selected{border-color:var(--charcoal);background:var(--snow)}
.plan-label{font-size:12px;font-weight:400;text-transform:uppercase;letter-spacing:.5px;opacity:.4;line-height:1.18}
.plan-title{font-size:18px;font-weight:300;letter-spacing:-.18px;line-height:1.22}
.plan-items{display:flex;flex-direction:column;gap:4px}
.plan-item{font-size:14px;font-weight:300;letter-spacing:-.07px;line-height:1.33;opacity:.6}

/* ---- resolved state ---- */
.resolved{display:none;margin-top:20px;padding:20px;background:var(--snow);border-radius:20px;text-align:center}
.resolved.show{display:block}
.resolved-icon{font-size:24px;margin-bottom:8px}
.resolved-text{font-size:16px;font-weight:300;letter-spacing:-.08px;line-height:1.29}
.resolved-sub{font-size:14px;font-weight:400;letter-spacing:-.07px;line-height:1.33;opacity:.45;margin-top:4px}

/* ---- typing ---- */
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:.7}}
.typing-row{display:flex;gap:5px;padding:4px 0}
.typing-row span{width:6px;height:6px;border-radius:50%;background:var(--charcoal);animation:blink 1.4s infinite both}
.typing-row span:nth-child(2){animation-delay:.2s}
.typing-row span:nth-child(3){animation-delay:.4s}

/* ---- hidden helper ---- */
.hidden{display:none}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="window.location.href='/'">← Back</button>
  <span class="topbar-title">바뀐 일정 확인하기</span>
</div>

<div class="scroll" id="scroll">

  <!-- 사용자 입력: 변수 발생 -->
  <div class="bubble">비행기 3시간 지연됐어</div>

  <!-- 타이핑 인디케이터 -->
  <div id="typing">
    <div class="typing-row"><span></span><span></span><span></span></div>
  </div>

  <!-- AI 추천 카드: 키스크린 -->
  <div class="card hidden" id="mainCard">
    <div class="card-context">KE723 · 14:00 → 17:00 출발</div>
    <div class="card-title">저녁 일정 조정이 필요해요</div>

    <!-- 영향받는 일정 -->
    <div class="section">
      <div class="section-label">영향받는 일정</div>
      <div class="section-item"><span class="dot dot-affected"></span>저녁 카페 17:30 — 시간 부족</div>
    </div>

    <!-- 유지되는 일정 -->
    <div class="section">
      <div class="section-label">유지</div>
      <div class="section-item"><span class="dot dot-keep"></span>호텔 체크인</div>
      <div class="section-item"><span class="dot dot-keep"></span>야경</div>
    </div>

    <!-- A안 / B안 비교 -->
    <div class="plans" id="plans">
      <div class="plan" data-plan="a" id="planA">
        <div class="plan-label">A안</div>
        <div class="plan-title">카페 취소</div>
        <div class="plan-items">
          <div class="plan-item">카페 예약 취소</div>
          <div class="plan-item">호텔 20:30</div>
          <div class="plan-item">야경 21:30</div>
        </div>
      </div>
      <div class="plan" data-plan="b" id="planB">
        <div class="plan-label">B안</div>
        <div class="plan-title">카페 늦추기</div>
        <div class="plan-items">
          <div class="plan-item">카페 20:30으로 변경</div>
          <div class="plan-item">호텔 21:30</div>
          <div class="plan-item">야경 22:00</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 선택 후 확정 -->
  <div class="resolved" id="resolved">
    <div class="resolved-icon">✓</div>
    <div class="resolved-text" id="resolvedText"></div>
    <div class="resolved-sub">일정표에 반영되었어요</div>
  </div>

</div>

<script>
(function(){
  const scroll = document.getElementById('scroll');
  const typing = document.getElementById('typing');
  const mainCard = document.getElementById('mainCard');
  const planA = document.getElementById('planA');
  const planB = document.getElementById('planB');
  const resolved = document.getElementById('resolved');
  const resolvedText = document.getElementById('resolvedText');

  // 1. 타이핑 → 카드 표시
  setTimeout(()=>{
    typing.classList.add('hidden');
    mainCard.classList.remove('hidden');
    scroll.scrollTop = scroll.scrollHeight;
  }, 1200);

  // 2. A안 선택
  planA.addEventListener('click',()=>{
    if(planA.classList.contains('selected')) return;
    planA.classList.add('selected');
    planB.classList.remove('selected');
    planB.style.opacity='.4';
    resolvedText.textContent='A안 적용 — 카페 취소, 나머지 유지';
    resolved.classList.add('show');
    scroll.scrollTop = scroll.scrollHeight;
  });

  // 3. B안 선택
  planB.addEventListener('click',()=>{
    if(planB.classList.contains('selected')) return;
    planB.classList.add('selected');
    planA.classList.remove('selected');
    planA.style.opacity='.4';
    resolvedText.textContent='B안 적용 — 카페 20:30, 전체 일정 조정';
    resolved.classList.add('show');
    scroll.scrollTop = scroll.scrollHeight;
  });
})();
</script>
</body>
</html>
