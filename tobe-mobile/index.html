<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>To-Be — 일정 변경 대응 (Mobile)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg:#faf9f5; --paper:#faf9f5; --surface:#ffffff;
  --surface-hover:#f5f3ed; --surface-active:#ebe8e0;
  --ink:#141413; --muted:#3d3d3a; --faint:#73726c; --disabled:#9c9a92;
  --line:#dedcd1; --line2:#dedcd1; --line-strong:#b7b7b5;
  --accent:#1f1e1d;
  --warn:#D94B3F; --warn-bg:#FEF0EE;
  --keep:#34A853; --keep-bg:#E8F5E9;
  --radius-xs:4px; --radius-sm:8px; --radius:12px; --radius-lg:16px; --radius-xl:20px;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1); --dur:150ms;
}
*{box-sizing:border-box;margin:0;padding:0}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
html,body{height:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100dvh;overflow:hidden;max-width:430px;margin:0 auto}

/* ---- header ---- */
.topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--paper);flex:none;min-height:56px}
.back-btn{background:var(--ink);color:#fff;border:none;font-family:var(--sans);font-size:13px;font-weight:600;padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:opacity var(--dur) var(--ease);flex:none}
.back-btn:active{opacity:.7}
.topbar-title{font-size:17px;font-weight:700;letter-spacing:-.02em}

/* ---- chat area ---- */
.chat-area{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}

/* user bubble */
.bubble-row{display:flex}
.bubble-row.user{justify-content:flex-end}
.bubble-row.ai{justify-content:flex-start}
.bubble{max-width:80%;padding:12px 16px;border-radius:var(--radius-lg);font-size:14px;line-height:1.6;word-break:keep-all}
.bubble-row.user .bubble{background:var(--surface);border:1px solid var(--line);color:var(--ink);border-bottom-right-radius:var(--radius-xs)}

/* recommendation card */
.reco-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px 20px;display:flex;flex-direction:column;gap:16px}
.reco-label{font-size:13px;font-weight:600;color:var(--faint);letter-spacing:.02em}
.reco-title{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.3;color:var(--ink)}

.reco-section{display:flex;flex-direction:column;gap:6px}
.reco-section-title{font-size:14px;font-weight:700;color:var(--ink)}
.reco-item{font-size:14px;color:var(--muted);line-height:1.5;padding-left:0}
.reco-item.action{color:var(--ink)}

.reco-divider{border:none;border-top:1px solid var(--line);margin:4px 0}

/* ---- bottom CTA ---- */
.cta-area{padding:16px;display:flex;flex-direction:column;gap:10px;border-top:1px solid var(--line);background:var(--paper);flex:none;padding-bottom:max(16px,env(safe-area-inset-bottom))}
.btn-primary{width:100%;padding:16px;border:none;border-radius:var(--radius);background:var(--ink);color:#fff;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:opacity var(--dur) var(--ease)}
.btn-primary:active{opacity:.8}
.btn-secondary{width:100%;padding:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);color:var(--muted);font-family:var(--sans);font-size:15px;font-weight:500;cursor:pointer;transition:border-color var(--dur) var(--ease),color var(--dur) var(--ease)}
.btn-secondary:active{border-color:var(--line-strong);color:var(--ink)}

/* ---- toast ---- */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;opacity:0;transition:opacity .3s var(--ease),transform .3s var(--ease);pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- modal overlay ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity .25s var(--ease)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--paper);border-radius:var(--radius-xl) var(--radius-xl) 0 0;width:100%;max-width:430px;max-height:85dvh;overflow-y:auto;padding:24px 20px 32px;transform:translateY(100%);transition:transform .3s var(--ease)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-.02em}

/* timeline in modal */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.tl-item:last-child{border-bottom:none}
.tl-time{font-family:var(--mono);font-size:12px;color:var(--faint);width:52px;flex:none;padding-top:2px}
.tl-content{flex:1}
.tl-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4}
.tl-detail{font-size:12px;color:var(--faint);margin-top:2px}
.tl-item.cancelled .tl-name{text-decoration:line-through;color:var(--disabled)}
.tl-item.cancelled .tl-detail{color:var(--disabled)}
.tl-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radius-xs);margin-left:6px}
.tl-badge.cancel{background:var(--warn-bg);color:var(--warn)}
.tl-badge.keep{background:var(--keep-bg);color:var(--keep)}
.tl-badge.delay{background:#FFF3E0;color:#E65100}

.modal-close{width:100%;padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);color:var(--muted);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;margin-top:16px}

/* ---- typing indicator ---- */
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.typing{display:flex;gap:4px;padding:12px 16px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--disabled);animation:blink 1.4s infinite both}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

/* scroll styling */
.chat-area::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <button class="back-btn" onclick="window.location.href='/'">뒤로</button>
  <span class="topbar-title">바뀐 일정 확인하기</span>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
  <!-- User message -->
  <div class="bubble-row user">
    <div class="bubble">비행기 3시간 지연됐어</div>
  </div>

  <!-- AI typing then recommendation -->
  <div id="aiResponse" style="display:none">
    <div class="reco-card">
      <div>
        <div class="reco-label">추천</div>
        <div class="reco-title">저녁 일정 가볍게</div>
      </div>

      <div class="reco-section">
        <div class="reco-section-title">해야 할 것</div>
        <div class="reco-item action">저녁 카페 예약 취소</div>
      </div>

      <div class="reco-section">
        <div class="reco-section-title">나머지 일정 유지</div>
        <div class="reco-item">호텔 체크인</div>
        <div class="reco-item">야경</div>
      </div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div id="typingIndicator" class="bubble-row ai">
    <div class="typing">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<!-- Bottom CTA -->
<div class="cta-area" id="ctaArea" style="display:none">
  <button class="btn-primary" id="btnProceed">이대로 진행</button>
  <button class="btn-secondary" id="btnDismiss">다음 안 보기</button>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">변경된 일정 상세</div>

    <div class="timeline">
      <div class="tl-item">
        <div class="tl-time">14:00</div>
        <div class="tl-content">
          <div class="tl-name">인천공항 출발 <span class="tl-badge delay">3h 지연</span></div>
          <div class="tl-detail">14:00 → 17:00 출발</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-time">19:30</div>
        <div class="tl-content">
          <div class="tl-name">오사카 간사이 도착 <span class="tl-badge delay">지연</span></div>
          <div class="tl-detail">원래 16:30 도착 예정</div>
        </div>
      </div>
      <div class="tl-item cancelled">
        <div class="tl-time">17:00</div>
        <div class="tl-content">
          <div class="tl-name">저녁 카페 <span class="tl-badge cancel">취소</span></div>
          <div class="tl-detail">시간 부족으로 방문 불가</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-time">20:30</div>
        <div class="tl-content">
          <div class="tl-name">호텔 체크인 <span class="tl-badge keep">유지</span></div>
          <div class="tl-detail">늦은 체크인 가능</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-time">21:30</div>
        <div class="tl-content">
          <div class="tl-name">야경 <span class="tl-badge keep">유지</span></div>
          <div class="tl-detail">도톤보리 야경 산책</div>
        </div>
      </div>
    </div>

    <button class="modal-close" id="modalClose">닫기</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function(){
  const chatArea = document.getElementById('chatArea');
  const typingIndicator = document.getElementById('typingIndicator');
  const aiResponse = document.getElementById('aiResponse');
  const ctaArea = document.getElementById('ctaArea');
  const btnProceed = document.getElementById('btnProceed');
  const btnDismiss = document.getElementById('btnDismiss');
  const detailModal = document.getElementById('detailModal');
  const modalClose = document.getElementById('modalClose');
  const toast = document.getElementById('toast');

  // Show typing then response
  setTimeout(()=>{
    typingIndicator.style.display='none';
    aiResponse.style.display='block';
    ctaArea.style.display='flex';
    chatArea.scrollTop = chatArea.scrollHeight;
  }, 1200);

  // Proceed button → show modal
  btnProceed.addEventListener('click',()=>{
    detailModal.classList.add('open');
  });

  // Dismiss button
  btnDismiss.addEventListener('click',()=>{
    showToast('다음부터 추천을 표시하지 않습니다');
    ctaArea.style.display='none';
  });

  // Close modal
  modalClose.addEventListener('click',()=>{
    detailModal.classList.remove('open');
    showToast('일정이 업데이트되었습니다');
  });

  // Tap overlay to close
  detailModal.addEventListener('click',(e)=>{
    if(e.target===detailModal) detailModal.classList.remove('open');
  });

  function showToast(msg){
    toast.textContent=msg;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2200);
  }

  // Allow new message input simulation
  let step=0;
  const scenarios=[
    {
      user:'숙소 근처 늦은 저녁 추천해줘',
      label:'추천',
      title:'숙소 근처 야식 스팟',
      sections:[
        {title:'추천 장소',items:['이치란 라멘 도톤보리점','마츠야 난바점']},
        {title:'참고',items:['도보 10분 이내','23시까지 영업']}
      ]
    },
    {
      user:'내일 비 온다는데 일정 괜찮아?',
      label:'추천',
      title:'실내 일정으로 전환',
      sections:[
        {title:'변경 제안',items:['나라 공원 → 오사카 아쿠아리움','산책 → 실내 쇼핑']},
        {title:'유지',items:['점심 예약','저녁 이자카야']}
      ]
    }
  ];

  chatArea.addEventListener('click',(e)=>{
    if(step>=scenarios.length) return;
    if(e.target.closest('.reco-card')||e.target.closest('.bubble')) return;

    const s=scenarios[step];
    step++;

    // Add user bubble
    const uRow=document.createElement('div');
    uRow.className='bubble-row user';
    uRow.innerHTML='<div class="bubble">'+s.user+'</div>';
    chatArea.appendChild(uRow);

    // Typing
    const tRow=document.createElement('div');
    tRow.className='bubble-row ai';
    tRow.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
    chatArea.appendChild(tRow);
    chatArea.scrollTop=chatArea.scrollHeight;

    setTimeout(()=>{
      tRow.remove();
      const card=document.createElement('div');
      let sectionsHtml='';
      s.sections.forEach(sec=>{
        sectionsHtml+='<div class="reco-section"><div class="reco-section-title">'+sec.title+'</div>';
        sec.items.forEach(item=>{sectionsHtml+='<div class="reco-item">'+item+'</div>'});
        sectionsHtml+='</div>';
      });
      card.innerHTML='<div class="reco-card"><div><div class="reco-label">'+s.label+'</div><div class="reco-title">'+s.title+'</div></div>'+sectionsHtml+'</div>';
      chatArea.appendChild(card);
      chatArea.scrollTop=chatArea.scrollHeight;
      ctaArea.style.display='flex';
    },1000);
  });
})();
</script>
</body>
</html>
