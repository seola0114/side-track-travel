<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>To-Be — 일정 변경 대응 (Mobile)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  /* Raus tokens */
  --charcoal:#23212c;
  --paper:#f7f0e1;
  --snow:#ffffff;
  --pine:#006434;
  --marigold:#fcbd1c;
  --morning-sky:#a6dfff;
  --ember:#dd5000;

  --sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --dur:150ms;

  /* radii */
  --r-card:20px;
  --r-btn:20px;
  --r-pill:99px;
  --r-chip:12px;
  --r-hero:40px;
}
*{box-sizing:border-box;margin:0;padding:0}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
html,body{height:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--charcoal);font-size:16px;line-height:1.29;letter-spacing:-.08px;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100dvh;overflow:hidden;max-width:430px;margin:0 auto}

/* ---- topbar ---- */
.topbar{display:flex;align-items:center;gap:16px;padding:16px 20px;background:var(--paper);flex:none;min-height:56px}
.back-btn{background:none;color:var(--pine);border:none;font-family:var(--sans);font-size:14px;font-weight:400;letter-spacing:-.07px;padding:0;cursor:pointer;flex:none;transition:opacity var(--dur) var(--ease)}
.back-btn:active{opacity:.5}
.topbar-title{font-size:22px;font-weight:300;letter-spacing:-.33px;line-height:1.15}

/* ---- chat area ---- */
.chat-area{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px}

/* user bubble */
.bubble-row{display:flex}
.bubble-row.user{justify-content:flex-end}
.bubble-row.ai{justify-content:flex-start}
.bubble{max-width:80%;padding:16px 20px;font-size:16px;line-height:1.29;letter-spacing:-.08px;font-weight:400;word-break:keep-all}
.bubble-row.user .bubble{background:var(--snow);color:var(--charcoal);border-radius:var(--r-card);border:none}

/* recommendation card — cream-on-cream layering */
.reco-card{background:var(--snow);border-radius:var(--r-hero);padding:24px 20px;display:flex;flex-direction:column;gap:0}
.reco-header{margin-bottom:20px}
.reco-label{font-size:12px;font-weight:400;color:var(--charcoal);letter-spacing:-.06px;text-transform:uppercase;line-height:1.18;margin-bottom:6px;opacity:.55}
.reco-title{font-size:28px;font-weight:300;letter-spacing:-.42px;line-height:1.07;color:var(--charcoal)}

.reco-section{padding:16px 0;border-top:1px solid rgba(35,33,44,.1)}
.reco-section-title{font-size:14px;font-weight:400;color:var(--charcoal);letter-spacing:-.07px;line-height:1.33;margin-bottom:4px}
.reco-item{font-size:16px;font-weight:300;color:var(--charcoal);line-height:1.29;letter-spacing:-.08px;opacity:.6}
.reco-item.action{opacity:1}

/* ---- bottom CTA ---- */
.cta-area{padding:20px;display:flex;flex-direction:column;gap:10px;background:var(--paper);flex:none;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.btn-primary{width:100%;padding:16px 24px;border:none;border-radius:var(--r-btn);background:var(--charcoal);color:var(--snow);font-family:var(--sans);font-size:16px;font-weight:400;letter-spacing:-.08px;cursor:pointer;transition:opacity var(--dur) var(--ease)}
.btn-primary:active{opacity:.8}
.btn-secondary{width:100%;padding:14px 20px;border:1px solid var(--charcoal);border-radius:var(--r-pill);background:transparent;color:var(--charcoal);font-family:var(--sans);font-size:14px;font-weight:400;letter-spacing:-.07px;cursor:pointer;transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}
.btn-secondary:active{background:var(--charcoal);color:var(--snow)}

/* ---- toast ---- */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--charcoal);color:var(--snow);padding:12px 24px;border-radius:var(--r-pill);font-size:14px;font-weight:400;letter-spacing:-.07px;opacity:0;transition:opacity .3s var(--ease),transform .3s var(--ease);pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- modal overlay ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(35,33,44,.35);display:flex;align-items:flex-end;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity .25s var(--ease)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--paper);border-radius:var(--r-hero) var(--r-hero) 0 0;width:100%;max-width:430px;max-height:85dvh;overflow-y:auto;padding:24px 20px 32px;transform:translateY(100%);transition:transform .3s var(--ease)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:rgba(35,33,44,.15);border-radius:2px;margin:0 auto 24px}
.modal-title{font-size:28px;font-weight:300;letter-spacing:-.42px;line-height:1.07;margin-bottom:20px;color:var(--charcoal)}

/* timeline in modal */
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid rgba(35,33,44,.1)}
.tl-item:last-child{border-bottom:none}
.tl-time{font-family:var(--sans);font-size:14px;font-weight:400;color:var(--charcoal);opacity:.45;width:48px;flex:none;padding-top:1px;letter-spacing:-.07px}
.tl-content{flex:1}
.tl-name{font-size:16px;font-weight:400;color:var(--charcoal);line-height:1.29;letter-spacing:-.08px}
.tl-detail{font-size:14px;font-weight:300;color:var(--charcoal);opacity:.45;margin-top:2px;letter-spacing:-.07px}
.tl-item.cancelled .tl-name{text-decoration:line-through;opacity:.35}
.tl-item.cancelled .tl-detail{opacity:.25}
.tl-badge{display:inline-block;font-size:12px;font-weight:400;padding:2px 10px;border-radius:var(--r-chip);margin-left:8px;vertical-align:middle;letter-spacing:-.06px}
.tl-badge.cancel{background:var(--charcoal);color:var(--snow)}
.tl-badge.keep{background:rgba(35,33,44,.06);color:var(--charcoal)}
.tl-badge.delay{background:var(--marigold);color:var(--charcoal)}

.modal-close{width:100%;padding:14px 20px;border:1px solid var(--charcoal);border-radius:var(--r-pill);background:transparent;color:var(--charcoal);font-family:var(--sans);font-size:14px;font-weight:400;letter-spacing:-.07px;cursor:pointer;margin-top:24px;transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}
.modal-close:active{background:var(--charcoal);color:var(--snow)}

/* ---- typing indicator ---- */
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:.7}}
.typing{display:flex;gap:5px;padding:16px 20px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--charcoal);animation:blink 1.4s infinite both}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

/* scroll */
.chat-area::-webkit-scrollbar{width:0;display:none}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <button class="back-btn" onclick="window.location.href='/'">← Back</button>
  <span class="topbar-title">바뀐 일정 확인하기</span>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
  <!-- User message -->
  <div class="bubble-row user">
    <div class="bubble">비행기 3시간 지연됐어</div>
  </div>

  <!-- AI typing then recommendation -->
  <div id="aiResponse" style="display:none">
    <div class="reco-card">
      <div class="reco-header">
        <div class="reco-label">추천</div>
        <div class="reco-title">저녁 일정 가볍게</div>
      </div>

      <div class="reco-section">
        <div class="reco-section-title">해야 할 것</div>
        <div class="reco-item action">저녁 카페 예약 취소</div>
      </div>

      <div class="reco-section">
        <div class="reco-section-title">나머지 일정 유지</div>
        <div class="reco-item">호텔 체크인</div>
        <div class="reco-item">야경</div>
      </div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div id="typingIndicator" class="bubble-row ai">
    <div class="typing">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<!-- Bottom CTA -->
<div class="cta-area" id="ctaArea" style="display:none">
  <button class="btn-primary" id="btnProceed">이대로 진행</button>
  <button class="btn-secondary" id="btnDismiss">다른 추천 보기 →</button>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">변경된 일정 상세</div>

    <div class="timeline">
      <div class="tl-item">
        <div class="tl-time">14:00</div>
        <div class="tl-content">
          <div class="tl-name">인천공항 출발 <span class="tl-badge delay">3h 지연</span></div>
          <div class="tl-detail">14:00 → 17:00 출발</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-time">19:30</div>
        <div class="tl-content">
          <div class="tl-name">오사카 간사이 도착 <span class="tl-badge delay">지연</span></div>
          <div class="tl-detail">원래 16:30 도착 예정</div>
        </div>
      </div>
      <div class="tl-item cancelled">
        <div class="tl-time">17:00</div>
        <div class="tl-content">
          <div class="tl-name">저녁 카페 <span class="tl-badge cancel">취소</span></div>
          <div class="tl-detail">시간 부족으로 방문 불가</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-time">20:30</div>
        <div class="tl-content">
          <div class="tl-name">호텔 체크인 <span class="tl-badge keep">유지</span></div>
          <div class="tl-detail">늦은 체크인 가능</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-time">21:30</div>
        <div class="tl-content">
          <div class="tl-name">야경 <span class="tl-badge keep">유지</span></div>
          <div class="tl-detail">도톤보리 야경 산책</div>
        </div>
      </div>
    </div>

    <button class="modal-close" id="modalClose">닫기</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function(){
  const chatArea = document.getElementById('chatArea');
  const typingIndicator = document.getElementById('typingIndicator');
  const aiResponse = document.getElementById('aiResponse');
  const ctaArea = document.getElementById('ctaArea');
  const btnProceed = document.getElementById('btnProceed');
  const btnDismiss = document.getElementById('btnDismiss');
  const detailModal = document.getElementById('detailModal');
  const modalClose = document.getElementById('modalClose');
  const toast = document.getElementById('toast');

  const altPlans=[
    {
      label:'추천',
      title:'저녁 일정 가볍게',
      sections:[
        {title:'해야 할 것',items:['저녁 카페 예약 취소']},
        {title:'나머지 일정 유지',items:['호텔 체크인','야경']}
      ]
    },
    {
      label:'대안 A',
      title:'카페 시간만 늦추기',
      sections:[
        {title:'변경',items:['저녁 카페 17:30 → 20:30으로 변경']},
        {title:'유지',items:['호텔 체크인 (21:30)','야경 (22:00)']}
      ]
    },
    {
      label:'대안 B',
      title:'오늘은 쉬어가기',
      sections:[
        {title:'취소',items:['저녁 카페 예약 취소','야경 생략']},
        {title:'유지',items:['호텔 체크인 후 휴식']}
      ]
    }
  ];
  let altIdx=0;

  setTimeout(()=>{
    typingIndicator.style.display='none';
    aiResponse.style.display='block';
    ctaArea.style.display='flex';
    chatArea.scrollTop = chatArea.scrollHeight;
  }, 1200);

  btnProceed.addEventListener('click',()=>{
    detailModal.classList.add('open');
  });

  btnDismiss.addEventListener('click',()=>{
    altIdx++;
    if(altIdx>=altPlans.length) altIdx=0;

    aiResponse.style.display='none';
    ctaArea.style.display='none';

    const tRow=document.createElement('div');
    tRow.className='bubble-row ai';
    tRow.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
    chatArea.appendChild(tRow);
    chatArea.scrollTop=chatArea.scrollHeight;

    setTimeout(()=>{
      tRow.remove();
      const p=altPlans[altIdx];
      const card=document.createElement('div');
      let html='<div class="reco-card"><div class="reco-header"><div class="reco-label">'+p.label+'</div><div class="reco-title">'+p.title+'</div></div>';
      p.sections.forEach(sec=>{
        html+='<div class="reco-section"><div class="reco-section-title">'+sec.title+'</div>';
        sec.items.forEach(item=>{html+='<div class="reco-item">'+item+'</div>'});
        html+='</div>';
      });
      html+='</div>';
      card.innerHTML=html;
      chatArea.appendChild(card);
      ctaArea.style.display='flex';
      chatArea.scrollTop=chatArea.scrollHeight;
    },800);
  });

  modalClose.addEventListener('click',()=>{
    detailModal.classList.remove('open');
    showToast('일정이 업데이트되었습니다');
  });

  detailModal.addEventListener('click',(e)=>{
    if(e.target===detailModal) detailModal.classList.remove('open');
  });

  function showToast(msg){
    toast.textContent=msg;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2200);
  }
})();
</script>
</body>
</html>
