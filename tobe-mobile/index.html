<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>Side Track — 일정 변경 대응</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root{
  /* DaleUI color tokens (light) */
  --white:#FFFFFF;
  --black:#000000;

  /* slate (neutral) */
  --slate-1:#F4F6F7;
  --slate-2:#E3E8EA;
  --slate-3:#CAD3D7;
  --slate-5:#A4B4BC;
  --slate-7:#5D727D;
  --slate-9:#455159;
  --slate-10:#3D464D;
  --slate-11:#363C43;
  --slate-12:#1C2024;

  /* violet (brand) */
  --violet-2:#F7F8FF;
  --violet-3:#EFF1FF;
  --violet-4:#E3E7FF;
  --violet-9:#5333E1;
  --violet-10:#481ACF;
  --violet-11:#32228D;

  /* semantic */
  --red-3:#FEEBEC;
  --red-10:#D7292E;
  --red-11:#CB2328;
  --amber-3:#FFF7C2;
  --amber-9:#FFC53D;
  --amber-11:#DD9E08;
  --amber-12:#4F3422;
  --green-3:#E6F6EB;
  --green-10:#21784F;
  --green-11:#1A6644;

  /* typography */
  --sans:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;

  /* radii */
  --r-xs:2px;
  --r-sm:4px;
  --r-md:8px;
  --r-lg:16px;
  --r-full:9999px;

  /* transitions */
  --ease:cubic-bezier(.4,0,.2,1);
  --dur:200ms;
}
*{box-sizing:border-box;margin:0;padding:0}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
html,body{height:100%}
body{font-family:var(--sans);background:var(--white);color:var(--slate-9);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100dvh;overflow:hidden;max-width:430px;margin:0 auto}

/* ---- topbar ---- */
.topbar{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--slate-5);background:var(--white);flex:none}
.back-btn{background:none;color:var(--violet-9);border:none;font-family:var(--sans);font-size:14px;font-weight:500;padding:0;cursor:pointer;flex:none;line-height:1.2;transition:color var(--dur) var(--ease)}
.back-btn:active{color:var(--violet-11)}
.topbar-title{font-size:18px;font-weight:600;color:var(--slate-12);line-height:1.2}

/* ---- scroll area ---- */
.scroll{flex:1;overflow-y:auto;padding:24px 16px 48px;display:flex;flex-direction:column;gap:16px}
.scroll::-webkit-scrollbar{width:0;display:none}

/* user bubble */
.bubble{align-self:flex-end;max-width:75%;padding:12px 16px;font-size:16px;line-height:1.5;font-weight:400;background:var(--slate-1);color:var(--slate-11);border-radius:var(--r-lg);border:1px solid var(--slate-2);word-break:keep-all}

/* ---- main card ---- */
.card{background:var(--white);border:1px solid var(--slate-5);border-radius:var(--r-md);padding:24px 16px;display:flex;flex-direction:column;gap:0}
.card-context{font-size:14px;font-weight:500;color:var(--slate-7);line-height:1.2;margin-bottom:4px}
.card-title{font-size:24px;font-weight:700;color:var(--slate-12);line-height:1.2;letter-spacing:-0.1px;margin-bottom:24px}

/* sections */
.section{padding:12px 0;border-top:1px solid var(--slate-2)}
.section-label{font-size:12px;font-weight:500;text-transform:uppercase;line-height:1.2;margin-bottom:8px;color:var(--slate-7)}
.section-item{font-size:14px;font-weight:400;line-height:1.5;color:var(--slate-9);display:flex;align-items:center;gap:8px}

/* tag-style dots */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 12px;border-radius:var(--r-full);font-size:12px;font-weight:500;line-height:1.2}
.tag-warning{background:var(--amber-3);color:var(--amber-12)}
.tag-neutral{background:var(--slate-1);color:var(--slate-7)}

/* ---- A/B plan comparison ---- */
.plans{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px}
.plan{background:var(--slate-1);border-radius:var(--r-md);padding:16px 12px;cursor:pointer;border:1.5px solid transparent;transition:border-color var(--dur) var(--ease),background-color var(--dur) var(--ease);display:flex;flex-direction:column;gap:8px;-webkit-tap-highlight-color:transparent}
.plan:active{transform:scale(.98)}
.plan.selected{border-color:var(--violet-9);background:var(--violet-2)}
.plan-label{font-size:12px;font-weight:500;color:var(--slate-7);line-height:1.2}
.plan-title{font-size:18px;font-weight:600;color:var(--slate-12);line-height:1.2}
.plan-items{display:flex;flex-direction:column;gap:4px}
.plan-item{font-size:14px;font-weight:400;color:var(--slate-7);line-height:1.5}

/* ---- resolved state ---- */
.resolved{display:none;padding:16px;background:var(--green-3);border-radius:var(--r-md);border:1px solid var(--green-10)}
.resolved.show{display:flex;align-items:flex-start;gap:8px}
.resolved-icon{font-size:16px;flex:none;margin-top:1px}
.resolved-body{flex:1}
.resolved-text{font-size:14px;font-weight:500;color:var(--green-11);line-height:1.5}
.resolved-sub{font-size:12px;font-weight:400;color:var(--green-10);line-height:1.5}

/* ---- typing ---- */
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:.8}}
.typing-row{display:flex;gap:5px;padding:8px 0}
.typing-row span{width:6px;height:6px;border-radius:50%;background:var(--slate-5);animation:blink 1.4s infinite both}
.typing-row span:nth-child(2){animation-delay:.2s}
.typing-row span:nth-child(3){animation-delay:.4s}

.hidden{display:none}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="window.location.href='/'">← 돌아가기</button>
  <span class="topbar-title">바뀐 일정 확인하기</span>
</div>

<div class="scroll" id="scroll">

  <!-- 사용자 입력: 변수 발생 -->
  <div class="bubble">비행기 3시간 지연됐어</div>

  <!-- 타이핑 -->
  <div id="typing">
    <div class="typing-row"><span></span><span></span><span></span></div>
  </div>

  <!-- 키스크린: AI 추천 카드 -->
  <div class="card hidden" id="mainCard">
    <div class="card-context">KE723 · 14:00 → 17:00 출발</div>
    <div class="card-title">저녁 일정 조정이 필요해요</div>

    <!-- 영향받는 일정 -->
    <div class="section">
      <div class="section-label">영향받는 일정</div>
      <div class="section-item">
        <span class="tag tag-warning">지연</span>
        저녁 카페 17:30 — 시간 부족
      </div>
    </div>

    <!-- 유지되는 일정 -->
    <div class="section">
      <div class="section-label">유지</div>
      <div class="section-item"><span class="tag tag-neutral">유지</span>호텔 체크인</div>
      <div class="section-item"><span class="tag tag-neutral">유지</span>야경</div>
    </div>

    <!-- A안 / B안 비교 -->
    <div class="plans" id="plans">
      <div class="plan" data-plan="a" id="planA">
        <div class="plan-label">A안</div>
        <div class="plan-title">카페 취소</div>
        <div class="plan-items">
          <div class="plan-item">카페 예약 취소</div>
          <div class="plan-item">호텔 20:30</div>
          <div class="plan-item">야경 21:30</div>
        </div>
      </div>
      <div class="plan" data-plan="b" id="planB">
        <div class="plan-label">B안</div>
        <div class="plan-title">카페 늦추기</div>
        <div class="plan-items">
          <div class="plan-item">카페 20:30으로 변경</div>
          <div class="plan-item">호텔 21:30</div>
          <div class="plan-item">야경 22:00</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 선택 후 확정 -->
  <div class="resolved" id="resolved">
    <div class="resolved-icon">✓</div>
    <div class="resolved-body">
      <div class="resolved-text" id="resolvedText"></div>
      <div class="resolved-sub">일정표에 반영되었어요</div>
    </div>
  </div>

</div>

<script>
(function(){
  const scroll = document.getElementById('scroll');
  const typing = document.getElementById('typing');
  const mainCard = document.getElementById('mainCard');
  const planA = document.getElementById('planA');
  const planB = document.getElementById('planB');
  const resolved = document.getElementById('resolved');
  const resolvedText = document.getElementById('resolvedText');

  setTimeout(()=>{
    typing.classList.add('hidden');
    mainCard.classList.remove('hidden');
    scroll.scrollTop = scroll.scrollHeight;
  }, 1200);

  planA.addEventListener('click',()=>{
    if(planA.classList.contains('selected')) return;
    planA.classList.add('selected');
    planB.classList.remove('selected');
    planB.style.opacity='.4';
    resolvedText.textContent='A안 적용 — 카페 취소, 나머지 유지';
    resolved.classList.add('show');
    scroll.scrollTop = scroll.scrollHeight;
  });

  planB.addEventListener('click',()=>{
    if(planB.classList.contains('selected')) return;
    planB.classList.add('selected');
    planA.classList.remove('selected');
    planA.style.opacity='.4';
    resolvedText.textContent='B안 적용 — 카페 20:30, 전체 일정 조정';
    resolved.classList.add('show');
    scroll.scrollTop = scroll.scrollHeight;
  });
})();
</script>
</body>
</html>
