<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>To-Be — 일정 변경 대응 (Mobile)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Hyer Aviation tokens */
  --ink:#000d10;
  --copper:#bc7155;
  --white:#ffffff;
  --dusk:#0f0f1c;
  --slate:#151623;
  --ash:#8e8e95;
  --bone:#d5d3d4;

  --sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --dur:150ms;
}
*{box-sizing:border-box;margin:0;padding:0}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
html,body{height:100%}
body{font-family:var(--sans);background:var(--white);color:var(--ink);font-size:17px;line-height:1.61;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100dvh;overflow:hidden;max-width:430px;margin:0 auto}

/* ---- topbar ---- */
.topbar{display:flex;align-items:center;gap:16px;padding:15px 22px;border-bottom:1px solid var(--ash);background:var(--white);flex:none;min-height:56px}
.back-btn{background:none;color:var(--ink);border:none;font-family:var(--sans);font-size:17px;font-weight:400;padding:0;cursor:pointer;letter-spacing:.2px;flex:none;transition:opacity var(--dur) var(--ease)}
.back-btn:active{opacity:.5}
.topbar-title{font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1.1}

/* ---- chat area ---- */
.chat-area{flex:1;overflow-y:auto;padding:34px 22px;display:flex;flex-direction:column;gap:22px}

/* user bubble */
.bubble-row{display:flex}
.bubble-row.user{justify-content:flex-end}
.bubble-row.ai{justify-content:flex-start}
.bubble{max-width:80%;padding:15px 22px;font-size:17px;line-height:1.61;word-break:keep-all;letter-spacing:.2px}
.bubble-row.user .bubble{background:var(--white);border:1px solid var(--ash);color:var(--ink);border-radius:0}

/* recommendation card — sharp edges, hairline dividers */
.reco-card{background:var(--white);border:1px solid var(--ink);border-radius:0;padding:34px 22px;display:flex;flex-direction:column;gap:0}
.reco-header{margin-bottom:22px}
.reco-label{font-size:17px;font-weight:400;color:var(--ash);letter-spacing:.2px;margin-bottom:4px}
.reco-title{font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1.1;color:var(--ink)}

.reco-section{padding:22px 0;border-top:1px solid var(--ash)}
.reco-section-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-.01em}
.reco-item{font-size:17px;color:var(--ash);line-height:1.61;letter-spacing:.2px}
.reco-item.action{color:var(--ink)}

/* ---- bottom CTA — pill buttons ---- */
.cta-area{padding:22px;display:flex;flex-direction:column;gap:11px;border-top:1px solid var(--ash);background:var(--white);flex:none;padding-bottom:max(22px,env(safe-area-inset-bottom))}
.btn-primary{width:100%;padding:15px 22px;border:none;border-radius:1000px;background:var(--copper);color:var(--white);font-family:var(--sans);font-size:17px;font-weight:700;cursor:pointer;transition:opacity var(--dur) var(--ease);letter-spacing:-.01em}
.btn-primary:active{opacity:.8}
.btn-secondary{width:100%;padding:15px 22px;border:1px solid var(--ink);border-radius:1000px;background:var(--white);color:var(--ink);font-family:var(--sans);font-size:17px;font-weight:700;cursor:pointer;transition:opacity var(--dur) var(--ease);letter-spacing:-.01em}
.btn-secondary:active{opacity:.7}

/* ---- toast ---- */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--white);padding:15px 22px;border-radius:1000px;font-size:17px;font-weight:400;letter-spacing:.2px;opacity:0;transition:opacity .3s var(--ease),transform .3s var(--ease);pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- modal overlay ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,13,16,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity .25s var(--ease)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--white);border-radius:0;width:100%;max-width:430px;max-height:85dvh;overflow-y:auto;padding:34px 22px 38px;transform:translateY(100%);transition:transform .3s var(--ease)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-title{font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-bottom:22px;color:var(--ink)}

/* timeline in modal */
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:16px;padding:17px 0;border-bottom:1px solid var(--ash)}
.tl-item:last-child{border-bottom:none}
.tl-time{font-family:var(--sans);font-size:17px;font-weight:400;color:var(--ash);width:52px;flex:none;padding-top:1px;letter-spacing:.2px}
.tl-content{flex:1}
.tl-name{font-size:17px;font-weight:700;color:var(--ink);line-height:1.4;letter-spacing:-.01em}
.tl-detail{font-size:17px;font-weight:400;color:var(--ash);margin-top:2px;letter-spacing:.2px}
.tl-item.cancelled .tl-name{text-decoration:line-through;color:var(--ash)}
.tl-item.cancelled .tl-detail{color:var(--bone)}
.tl-badge{display:inline-block;font-size:14px;font-weight:700;padding:2px 11px;border-radius:0;margin-left:8px;vertical-align:middle;letter-spacing:0}
.tl-badge.cancel{background:var(--ink);color:var(--white)}
.tl-badge.keep{background:none;border:1px solid var(--ash);color:var(--ash)}
.tl-badge.delay{background:var(--copper);color:var(--white)}

.modal-close{width:100%;padding:15px 22px;border:1px solid var(--ink);border-radius:1000px;background:var(--white);color:var(--ink);font-family:var(--sans);font-size:17px;font-weight:700;cursor:pointer;margin-top:34px;letter-spacing:-.01em}

/* ---- typing indicator ---- */
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.typing{display:flex;gap:5px;padding:15px 22px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--ash);animation:blink 1.4s infinite both}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

/* scroll */
.chat-area::-webkit-scrollbar{width:0;display:none}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <button class="back-btn" onclick="window.location.href='/'">← Back</button>
  <span class="topbar-title">바뀐 일정 확인하기</span>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
  <!-- User message -->
  <div class="bubble-row user">
    <div class="bubble">비행기 3시간 지연됐어</div>
  </div>

  <!-- AI typing then recommendation -->
  <div id="aiResponse" style="display:none">
    <div class="reco-card">
      <div class="reco-header">
        <div class="reco-label">추천</div>
        <div class="reco-title">저녁 일정 가볍게</div>
      </div>

      <div class="reco-section">
        <div class="reco-section-title">해야 할 것</div>
        <div class="reco-item action">저녁 카페 예약 취소</div>
      </div>

      <div class="reco-section">
        <div class="reco-section-title">나머지 일정 유지</div>
        <div class="reco-item">호텔 체크인</div>
        <div class="reco-item">야경</div>
      </div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div id="typingIndicator" class="bubble-row ai">
    <div class="typing">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<!-- Bottom CTA -->
<div class="cta-area" id="ctaArea" style="display:none">
  <button class="btn-primary" id="btnProceed">이대로 진행</button>
  <button class="btn-secondary" id="btnDismiss">다른 추천 보기</button>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-sheet">
    <div class="modal-title">변경된 일정 상세</div>

    <div class="timeline">
      <div class="tl-item">
        <div class="tl-time">14:00</div>
        <div class="tl-content">
          <div class="tl-name">인천공항 출발 <span class="tl-badge delay">3h 지연</span></div>
          <div class="tl-detail">14:00 → 17:00 출발</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-time">19:30</div>
        <div class="tl-content">
          <div class="tl-name">오사카 간사이 도착 <span class="tl-badge delay">지연</span></div>
          <div class="tl-detail">원래 16:30 도착 예정</div>
        </div>
      </div>
      <div class="tl-item cancelled">
        <div class="tl-time">17:00</div>
        <div class="tl-content">
          <div class="tl-name">저녁 카페 <span class="tl-badge cancel">취소</span></div>
          <div class="tl-detail">시간 부족으로 방문 불가</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-time">20:30</div>
        <div class="tl-content">
          <div class="tl-name">호텔 체크인 <span class="tl-badge keep">유지</span></div>
          <div class="tl-detail">늦은 체크인 가능</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-time">21:30</div>
        <div class="tl-content">
          <div class="tl-name">야경 <span class="tl-badge keep">유지</span></div>
          <div class="tl-detail">도톤보리 야경 산책</div>
        </div>
      </div>
    </div>

    <button class="modal-close" id="modalClose">닫기</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function(){
  const chatArea = document.getElementById('chatArea');
  const typingIndicator = document.getElementById('typingIndicator');
  const aiResponse = document.getElementById('aiResponse');
  const ctaArea = document.getElementById('ctaArea');
  const btnProceed = document.getElementById('btnProceed');
  const btnDismiss = document.getElementById('btnDismiss');
  const detailModal = document.getElementById('detailModal');
  const modalClose = document.getElementById('modalClose');
  const toast = document.getElementById('toast');

  // Alternative plans to cycle through
  const altPlans=[
    {
      label:'추천',
      title:'저녁 일정 가볍게',
      sections:[
        {title:'해야 할 것',items:['저녁 카페 예약 취소']},
        {title:'나머지 일정 유지',items:['호텔 체크인','야경']}
      ]
    },
    {
      label:'대안 A',
      title:'카페 시간만 늦추기',
      sections:[
        {title:'변경',items:['저녁 카페 17:30 → 20:30으로 변경']},
        {title:'유지',items:['호텔 체크인 (21:30)','야경 (22:00)']}
      ]
    },
    {
      label:'대안 B',
      title:'오늘은 쉬어가기',
      sections:[
        {title:'취소',items:['저녁 카페 예약 취소','야경 생략']},
        {title:'유지',items:['호텔 체크인 후 휴식']}
      ]
    }
  ];
  let altIdx=0;

  // Show typing then response
  setTimeout(()=>{
    typingIndicator.style.display='none';
    aiResponse.style.display='block';
    ctaArea.style.display='flex';
    chatArea.scrollTop = chatArea.scrollHeight;
  }, 1200);

  // Proceed button → show modal
  btnProceed.addEventListener('click',()=>{
    detailModal.classList.add('open');
  });

  // Dismiss button → show next alternative
  btnDismiss.addEventListener('click',()=>{
    altIdx++;
    if(altIdx>=altPlans.length) altIdx=0;

    aiResponse.style.display='none';
    ctaArea.style.display='none';

    const tRow=document.createElement('div');
    tRow.className='bubble-row ai';
    tRow.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
    chatArea.appendChild(tRow);
    chatArea.scrollTop=chatArea.scrollHeight;

    setTimeout(()=>{
      tRow.remove();
      const p=altPlans[altIdx];
      const card=document.createElement('div');
      let html='<div class="reco-card"><div class="reco-header"><div class="reco-label">'+p.label+'</div><div class="reco-title">'+p.title+'</div></div>';
      p.sections.forEach(sec=>{
        html+='<div class="reco-section"><div class="reco-section-title">'+sec.title+'</div>';
        sec.items.forEach(item=>{html+='<div class="reco-item">'+item+'</div>'});
        html+='</div>';
      });
      html+='</div>';
      card.innerHTML=html;
      chatArea.appendChild(card);
      ctaArea.style.display='flex';
      chatArea.scrollTop=chatArea.scrollHeight;
    },800);
  });

  // Close modal
  modalClose.addEventListener('click',()=>{
    detailModal.classList.remove('open');
    showToast('일정이 업데이트되었습니다');
  });

  // Tap overlay to close
  detailModal.addEventListener('click',(e)=>{
    if(e.target===detailModal) detailModal.classList.remove('open');
  });

  function showToast(msg){
    toast.textContent=msg;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2200);
  }
})();
</script>
</body>
</html>
